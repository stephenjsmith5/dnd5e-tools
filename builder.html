<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --parchment: #f5edd6; --ink: #2c1a0e; --ink-light: #5c3d1e;
  --gold: #b8860b; --gold-light: #d4a017; --red-accent: #8b1a1a;
  --border-col: #c9a84c; --surface: #fdf6e3; --surface2: #f0e2b6;
  --muted: #7a5c3a; --hp-red: #c0392b; --ac-blue: #1a4a6b; --spd-green: #1a5c2a;
}
body { background: var(--parchment); font-family: 'Crimson Text', Georgia, serif; color: var(--ink); min-height: 100vh; }
.app { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem; }
.app-header { text-align: center; padding: 1.5rem 0 1rem; border-bottom: 2px solid var(--border-col); margin-bottom: 1.5rem; }
.app-header h1 { font-family: 'Cinzel', serif; font-size: 28px; font-weight: 700; color: var(--red-accent); letter-spacing: 2px; text-shadow: 1px 1px 0 var(--gold); }
.app-header p { font-size: 14px; color: var(--muted); margin-top: 4px; font-style: italic; }
.steps-nav { display: flex; justify-content: center; gap: 6px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.step-btn { font-family: 'Cinzel', serif; font-size: 11px; padding: 5px 12px; border: 1px solid var(--border-col); background: var(--surface2); color: var(--ink-light); cursor: pointer; border-radius: 4px; letter-spacing: 0.5px; transition: all 0.2s; }
.step-btn:hover { background: var(--border-col); color: var(--ink); }
.step-btn.active { background: var(--red-accent); color: #fff; border-color: var(--red-accent); }
.step-btn.done { background: var(--gold); color: var(--ink); border-color: var(--gold); }
.section-card { background: var(--surface); border: 1px solid var(--border-col); border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
.section-title { font-family: 'Cinzel', serif; font-size: 16px; font-weight: 600; color: var(--red-accent); border-bottom: 1px solid var(--border-col); padding-bottom: 8px; margin-bottom: 12px; letter-spacing: 1px; }
label { font-size: 14px; color: var(--ink-light); display: block; margin-bottom: 4px; font-weight: 600; }
input[type="text"], select, textarea { width: 100%; border: 1px solid var(--border-col); background: var(--parchment); color: var(--ink); font-family: 'Crimson Text', serif; font-size: 15px; padding: 7px 10px; border-radius: 4px; outline: none; transition: border-color 0.2s; }
input[type="number"] { border: 1px solid var(--border-col); background: var(--parchment); color: var(--ink); font-family: 'Crimson Text', serif; font-size: 15px; padding: 7px 10px; border-radius: 4px; outline: none; }
input:focus, select:focus, textarea:focus { border-color: var(--red-accent); }
textarea { resize: vertical; min-height: 80px; }
.row { display: grid; gap: 12px; margin-bottom: 12px; }
.row.cols-2 { grid-template-columns: 1fr 1fr; }
.race-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
.subrace-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; margin-top: 12px; }
.class-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
.background-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; }
.choice-card { background: var(--surface2); border: 1.5px solid var(--border-col); border-radius: 6px; padding: 10px 8px; text-align: center; cursor: pointer; transition: all 0.2s; }
.choice-card:hover { border-color: var(--gold-light); background: var(--parchment); }
.choice-card.selected { border-color: var(--red-accent); background: #f9e8e8; }
.choice-card .choice-icon { font-size: 20px; margin-bottom: 4px; }
.choice-card .choice-name { font-family: 'Cinzel', serif; font-size: 11px; color: var(--ink); letter-spacing: 0.5px; font-weight: 600; }
.choice-card .choice-sub { font-size: 10px; color: var(--muted); margin-top: 2px; font-style: italic; line-height: 1.3; }
.info-box { background: var(--surface2); border-left: 3px solid var(--gold); padding: 10px 14px; border-radius: 0 6px 6px 0; font-size: 13px; color: var(--ink-light); line-height: 1.7; margin-top: 10px; }
.info-box strong { color: var(--ink); font-weight: 600; }
.subrace-label { font-family: 'Cinzel', serif; font-size: 13px; color: var(--gold); margin: 14px 0 6px; letter-spacing: 0.5px; }
.ability-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
.ability-box { background: var(--surface2); border: 1.5px solid var(--border-col); border-radius: 6px; padding: 10px 8px; text-align: center; }
.ability-name { font-family: 'Cinzel', serif; font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-bottom: 4px; }
.ability-score-input { width: 100%; text-align: center; font-size: 22px; font-weight: 600; background: transparent; border: none; border-bottom: 1px solid var(--border-col); color: var(--ink); padding: 2px 0; font-family: 'Cinzel', serif; outline: none; }
.ability-modifier { font-size: 18px; font-weight: 600; color: var(--red-accent); margin-top: 4px; font-family: 'Cinzel', serif; }
.skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 5px; }
.skill-row { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 4px 6px; border-radius: 4px; transition: background 0.15s; position: relative; }
.skill-row.clickable { cursor: pointer; }
.skill-row.clickable:hover { background: var(--surface2); }
.skill-row:hover .skill-tooltip { opacity: 1; pointer-events: none; }
.skill-tooltip {
  display: block;
  opacity: 0;
  position: absolute;
  bottom: calc(100% + 6px);
  left: 0;
  width: 220px;
  background: var(--ink);
  color: var(--parchment);
  font-size: 12px;
  line-height: 1.5;
  padding: 8px 10px;
  border-radius: 5px;
  border: 1px solid var(--border-col);
  z-index: 100;
  pointer-events: none;
  transition: opacity 0.15s;
  font-family: 'Crimson Text', serif;
  font-style: italic;
}
.skill-tooltip::after {
  content: '';
  position: absolute;
  top: 100%;
  left: 14px;
  border: 5px solid transparent;
  border-top-color: var(--ink);
}
.skill-check { width: 16px; height: 16px; border: 1.5px solid var(--border-col); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.skill-check.checked { background: var(--red-accent); border-color: var(--red-accent); }
.skill-check.checked::after { content: ''; width: 6px; height: 6px; background: white; border-radius: 50%; }
.skill-name { flex: 1; }
.skill-stat { color: var(--muted); font-size: 11px; font-style: italic; }
.skill-bonus { font-family: 'Cinzel', serif; font-size: 12px; font-weight: 600; color: var(--red-accent); min-width: 28px; text-align: right; }
.stat-strip { display: flex; gap: 10px; flex-wrap: wrap; }
.stat-badge { display: flex; flex-direction: column; align-items: center; background: var(--surface2); border: 1.5px solid var(--border-col); border-radius: 6px; padding: 8px 12px; min-width: 66px; }
.stat-badge.hp { border-color: var(--hp-red); }
.stat-badge.ac { border-color: var(--ac-blue); }
.stat-badge.spd { border-color: var(--spd-green); }
.stat-badge-val { font-family: 'Cinzel', serif; font-size: 22px; font-weight: 700; }
.stat-badge.hp .stat-badge-val { color: var(--hp-red); }
.stat-badge.ac .stat-badge-val { color: var(--ac-blue); }
.stat-badge.spd .stat-badge-val { color: var(--spd-green); }
.stat-badge-label { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; font-family: 'Cinzel', serif; margin-top: 2px; }
.btn-primary { font-family: 'Cinzel', serif; font-size: 13px; padding: 9px 20px; background: var(--red-accent); color: white; border: none; border-radius: 5px; cursor: pointer; letter-spacing: 0.5px; transition: background 0.2s; }
.btn-primary:hover { background: #6b1313; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary { font-family: 'Cinzel', serif; font-size: 13px; padding: 9px 20px; background: var(--surface2); color: var(--ink-light); border: 1px solid var(--border-col); border-radius: 5px; cursor: pointer; letter-spacing: 0.5px; transition: all 0.2s; }
.btn-secondary:hover { background: var(--border-col); }
.nav-btns { display: flex; justify-content: space-between; margin-top: 16px; align-items: center; }
.asi-pick { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
.asi-pick-btn { font-family: 'Cinzel', serif; font-size: 12px; padding: 5px 12px; border: 1.5px solid var(--border-col); background: var(--surface2); border-radius: 4px; cursor: pointer; transition: all 0.15s; }
.asi-pick-btn.selected { background: var(--red-accent); color: white; border-color: var(--red-accent); }
.asi-pick-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.feat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 6px; margin-top: 8px; max-height: 300px; overflow-y: auto; border: 1px solid var(--border-col); border-radius: 6px; padding: 8px; background: var(--parchment); }
.feat-card { background: var(--surface2); border: 1px solid var(--border-col); border-radius: 5px; padding: 8px; cursor: pointer; transition: all 0.15s; }
.feat-card:hover { border-color: var(--gold-light); }
.feat-card.selected { border-color: var(--red-accent); background: #f9e8e8; }
.feat-card-name { font-family: 'Cinzel', serif; font-size: 11px; font-weight: 600; color: var(--ink); }
.feat-card-desc { font-size: 11px; color: var(--muted); margin-top: 3px; font-style: italic; line-height: 1.4; }
.character-sheet { background: var(--surface); border: 2px solid var(--border-col); border-radius: 10px; padding: 1.5rem; }
.sheet-header { display: grid; grid-template-columns: 1fr auto; gap: 16px; border-bottom: 2px solid var(--border-col); padding-bottom: 1rem; margin-bottom: 1rem; align-items: start; }
.char-name-display { font-family: 'Cinzel', serif; font-size: 26px; font-weight: 700; color: var(--ink); }
.char-meta { font-size: 13px; color: var(--muted); margin-top: 4px; font-style: italic; line-height: 1.5; }
.sheet-cols { display: grid; grid-template-columns: 1fr 2fr; gap: 16px; }
.ability-display-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.ability-display-box { text-align: center; background: var(--surface2); border: 1px solid var(--border-col); border-radius: 6px; padding: 8px; }
.ability-display-name { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 1px; color: var(--muted); }
.ability-display-score { font-family: 'Cinzel', serif; font-size: 20px; font-weight: 700; color: var(--ink); }
.ability-display-mod { font-size: 13px; color: var(--red-accent); font-weight: 600; }
.trait-item { font-size: 13px; color: var(--ink-light); line-height: 1.5; margin-bottom: 6px; }
.prof-bonus-note { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 6px; }
.pb-btn { font-family:'Cinzel',serif; font-size:16px; font-weight:700; width:28px; height:28px; border:1.5px solid var(--border-col); background:var(--surface); color:var(--ink); border-radius:4px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; padding:0; line-height:1; }
.pb-btn:hover:not(:disabled) { background:var(--border-col); }
.pb-btn:disabled { opacity:0.3; cursor:not-allowed; }
.mode-active { border-color:var(--red-accent) !important; color:var(--red-accent) !important; }

/* ── Tooltip system ── */
[data-tip]{position:relative;}
[data-tip]::before{content:attr(data-tip);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#2c1a0e;color:#f5edd6;padding:7px 11px;border-radius:5px;font-size:12px;line-height:1.5;white-space:normal;width:230px;max-width:290px;pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:9999;font-family:'Crimson Text',Georgia,serif;font-weight:400;font-style:normal;border:1px solid #c9a84c;box-shadow:0 3px 10px rgba(0,0,0,0.4);text-align:left;}
[data-tip]:hover::before{opacity:1;}
[data-tip].tip-right::before{left:0;transform:none;}
[data-tip].tip-left::before{left:auto;right:0;transform:none;}
[data-tip].tip-below::before{bottom:auto;top:calc(100% + 8px);}
[data-tip]{cursor:help;}
button[data-tip],label[data-tip]{cursor:pointer;}

.eq-section-label{font-family:'Cinzel',serif;font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:0.8px;margin:8px 0 5px;}
.armor-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;}
.armor-card{background:var(--surface2);border:1.5px solid var(--border-col);border-radius:6px;padding:8px;cursor:pointer;transition:all 0.2s;position:relative;}
.armor-card:hover{border-color:var(--gold-light);}
.armor-card.selected{border-color:var(--red-accent);background:#f9e8e8;}
.armor-card.no-prof{opacity:0.55;}
.armor-card .armor-name{font-family:'Cinzel',serif;font-size:11px;font-weight:600;color:var(--ink);}
.armor-card .armor-stat{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.3;}
.armor-card .prof-badge{position:absolute;top:4px;right:5px;font-size:10px;}
.wpn-table{width:100%;border-collapse:collapse;font-size:12px;}
.wpn-table th{font-family:'Cinzel',serif;font-size:10px;color:var(--muted);letter-spacing:0.4px;text-align:left;padding:4px 6px;border-bottom:1px solid var(--border-col);}
.wpn-table td{padding:3px 6px;border-bottom:1px solid rgba(201,168,76,0.2);vertical-align:middle;}
.wpn-table tr.no-prof td{color:var(--muted);}
.wpn-table tr:hover td{background:var(--surface2);cursor:pointer;}
.wpn-table tr.wpn-selected td{background:#f9e8e8;}
.wpn-check{width:14px;height:14px;border:1.5px solid var(--border-col);border-radius:3px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.wpn-check.checked{background:var(--red-accent);border-color:var(--red-accent);}
.wpn-check.checked::after{content:'';width:7px;height:5px;border-left:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(-45deg) translate(1px,-1px);display:block;}
.ac-preview{background:var(--surface2);border:1.5px solid var(--ac-blue);border-radius:8px;padding:8px 14px;display:inline-flex;align-items:center;gap:12px;margin-bottom:12px;}
.ac-preview-val{font-family:'Cinzel',serif;font-size:26px;font-weight:700;color:var(--ac-blue);}
@media print { .steps-nav, .nav-btns { display: none !important; } body { background: white; } }
@media (max-width: 600px) {
  .ability-grid { grid-template-columns: repeat(2, 1fr); }
  .row.cols-2 { grid-template-columns: 1fr; }
  .sheet-cols { grid-template-columns: 1fr; }
  .sheet-header { grid-template-columns: 1fr; }
}
/* Toast notifications */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:13px;font-family:'Crimson Text',serif;box-shadow:0 4px 12px rgba(0,0,0,.5);pointer-events:none;animation:toastIn .25s ease,toastOut .3s ease 2.2s forwards;}
.toast.success{border-color:#5a9e5a;color:#7ecf7e;}
.toast.warning{border-color:var(--gold);color:var(--gold-light);}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateY(-8px)}}
.ruleset-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;border:1px solid var(--gold);color:var(--gold-light);font-family:'Cinzel',serif;background:rgba(212,175,55,.08);}
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <h1>Seabass' DnD Character Builder</h1>
    <p>Player's Handbook — Fifth Edition (2014) · PHB Strict</p>
  </div>
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap;">
    <div class="steps-nav" id="stepsNav" style="margin-bottom:0;flex:1;justify-content:flex-start;"></div>
    <label style="font-family:'Cinzel',serif;font-size:11px;padding:5px 12px;background:var(--surface2);border:1px solid var(--border-col);border-radius:4px;cursor:pointer;color:var(--ink-light);letter-spacing:0.5px;white-space:nowrap;flex-shrink:0;" title="Load an existing character JSON to edit">
      📂 Import Character JSON
      <input type="file" accept=".json" onchange="importCharacter(this)" style="display:none;"/>
    </label>
  </div>
  <div id="appContent"></div>
</div>
<script>
const RACES = [
  { id:'human', name:'Human', icon:'🧑', sub:'Versatile',
    subraces:[
      { id:'human_std', name:'Standard Human', sub:'+1 to all six ability scores',
        asi:{str:1,dex:1,con:1,int:1,wis:1,cha:1}, speed:30, size:'Medium',
        traits:['Extra Language (one of your choice)','Adaptable and resourceful'],
        languages:['Common','One of your choice'] },
      { id:'human_var', name:'Variant Human', sub:'Feat + 2 chosen ASIs + 1 skill',
        asi:{}, speed:30, size:'Medium', isVariant:true,
        traits:['One feat of your choice','One skill proficiency of your choice','+1 to two ability scores of your choice'],
        languages:['Common','One of your choice'] }
    ]
  },
  { id:'elf', name:'Elf', icon:'🧝', sub:'DEX +2 · Three subraces',
    subraces:[
      { id:'elf_high', name:'High Elf', sub:'INT +1 · Cantrip · Extra language',
        asi:{dex:2,int:1}, speed:30, size:'Medium',
        traits:['Darkvision 60 ft','Keen Senses — Perception proficiency','Fey Ancestry — advantage vs charm, immune to magic sleep','Trance — 4 hr rest instead of 8','Elf Weapon Training — longsword, shortsword, shortbow, longbow','Cantrip — one wizard cantrip (INT)','Extra Language'],
        languages:['Common','Elvish','One of your choice'], proficiencies:['Perception'] },
      { id:'elf_wood', name:'Wood Elf', sub:'WIS +1 · 35 ft speed · Mask of the Wild',
        asi:{dex:2,wis:1}, speed:35, size:'Medium',
        traits:['Darkvision 60 ft','Keen Senses — Perception proficiency','Fey Ancestry','Trance','Elf Weapon Training','Fleet of Foot — speed 35 ft','Mask of the Wild — hide in natural phenomena'],
        languages:['Common','Elvish'], proficiencies:['Perception'] },
      { id:'elf_drow', name:'Dark Elf (Drow)', sub:'CHA +1 · Superior Darkvision · Drow Magic',
        asi:{dex:2,cha:1}, speed:30, size:'Medium',
        traits:['Superior Darkvision 120 ft','Keen Senses — Perception proficiency','Fey Ancestry','Trance','Sunlight Sensitivity — disadvantage in sunlight','Drow Magic — Dancing Lights / Faerie Fire / Darkness (CHA)','Drow Weapon Training — rapiers, shortswords, hand crossbows'],
        languages:['Common','Elvish'], proficiencies:['Perception'] }
    ]
  },

// PHB Point Buy cost table: score → points spent
const PB_COST={8:0,9:1,10:2,11:3,12:4,13:5,14:7,15:9};
const PB_MAX=27;
const PB_SCORE_MIN=8;
const PB_SCORE_MAX=15;

function pbCost(score){return PB_COST[score]??0;}
function pbTotal(abs){return Object.values(abs).reduce((t,v)=>t+pbCost(Math.max(PB_SCORE_MIN,Math.min(PB_SCORE_MAX,v))),0);}
function pbRemaining(abs){return PB_MAX-pbTotal(abs);}

let state={
  step:0,name:'',alignment:'True Neutral',appearance:'',personalityTrait:'',ideals:'',bonds:'',flaws:'',
  backstory:'',

function getMod(s){const m=Math.floor((s-10)/2);return(m>=0?'+':'')+m;}
function getModNum(s){return Math.floor((s-10)/2);}
function getProfBonus(l){return Math.ceil(l/4)+1;}

function getSubrace(){
  if(!state.subrace)return null;
  for(const r of RACES){const sr=r.subraces.find(s=>s.id===state.subrace);if(sr)return sr;}
  return null;
}

function getRaceBonus(){
  const sr=getSubrace();if(!sr)return{};
  const b={...(sr.asi||{})};
  if(sr.isVariant)state.variantASI.forEach(s=>{b[s]=(b[s]||0)+1;});
  if(sr.isHalfElf)state.halfElfASI.forEach(s=>{b[s]=(b[s]||0)+1;});
  return b;
}

function getEffectiveAbility(stat){return(state.abilities[stat]||10)+(getRaceBonus()[stat]||0);}
function getAvgHP(){
  // Level 1: max hit die + CON mod. Each subsequent level: floor(hitDie/2)+1 + CON mod
  const cls=CLASSES.find(c=>c.id===state.class);
  if(!cls)return 0;
  const conMod=getModNum(getEffectiveAbility('con'));
  const hd=cls.hitDie;
  const lv1=hd+conMod;
  const perLv=Math.floor(hd/2)+1+conMod; // average roll per level after 1st
  return lv1+Math.max(0,state.level-1)*perLv;
}
function getMaxHP(){
  if(state.hpOverride!==null&&state.hpOverride!==undefined&&state.hpOverride!=='')
    return parseInt(state.hpOverride)||getAvgHP();
  return getAvgHP();
}
function getAC(){
  const eq=state.equipment;
  const armor=eq&&eq.armorId?ARMORS.find(a=>a.id===eq.armorId):null;
  const d=getModNum(getEffectiveAbility('dex'));
  const cls=CLASSES.find(c=>c.id===state.class);
  let ac;
  if(armor){
    if(armor.cat==='light') ac=armor.baseAC+d;
    else if(armor.cat==='medium') ac=armor.baseAC+Math.min(d,2);
    else ac=armor.baseAC; // heavy
  } else {
    if(cls&&cls.id==='monk') ac=10+d+getModNum(getEffectiveAbility('wis'));
    else if(cls&&cls.id==='barbarian') ac=10+d+getModNum(getEffectiveAbility('con'));
    else ac=10+d;
  }
  if(eq&&eq.hasShield) ac+=2;
  return ac;
}
function getUnarmoredAC(){
  const d=getModNum(getEffectiveAbility('dex'));
  const cls=CLASSES.find(c=>c.id===state.class);
  if(cls&&cls.id==='monk') return 10+d+getModNum(getEffectiveAbility('wis'));
  if(cls&&cls.id==='barbarian') return 10+d+getModNum(getEffectiveAbility('con'));
  return 10+d;
}
function getACBreakdown(){
  const eq=state.equipment;
  const armor=eq&&eq.armorId?ARMORS.find(a=>a.id===eq.armorId):null;
  const d=getModNum(getEffectiveAbility('dex'));
  const parts=[];
  if(armor){
    if(armor.cat==='light') parts.push(`${armor.name} (${armor.baseAC}${d>=0?'+'+d:d})`);
    else if(armor.cat==='medium'){const dd=Math.min(d,2);parts.push(`${armor.name} (${armor.baseAC}${dd>=0?'+'+dd:dd})`);}
    else parts.push(`${armor.name} (${armor.baseAC})`);
  } else {
    parts.push(`Unarmored (10${d>=0?'+'+d:d})`);
  }
  if(eq&&eq.hasShield) parts.push('+2 Shield');
  return parts.join(' ');
}
// Lookup: weapon id → keyword(s) that grant proficiency when found in cls.weapons string
const WEAPON_PROF_TERMS={
  xbow_hand:['hand crossbow'],xbow_light:['light crossbow'],xbow_heavy:['heavy crossbow'],
  longsword:['longsword'],rapier:['rapier'],shortsword:['shortsword'],
  dagger:['dagger'],dart:['dart'],sling:['sling'],quarterstaff:['quarterstaff'],
  scimitar:['scimitar'],club:['club'],mace:['mace'],javelin:['javelin'],
  spear:['spear'],sickle:['sickle'],
};
function hasWeaponProf(weapon){
  const cls=CLASSES.find(c=>c.id===state.class);
  if(!cls) return false;
  const w=cls.weapons||'';
  if(w.includes('Martial')) return true;
  if(w.includes('Simple')&&weapon.profCat.startsWith('simple')) return true;
  // Specific weapon lists (Bard, Rogue, Druid, Sorcerer, Wizard, Monk, Warlock)
  const wl=w.toLowerCase();
  return (WEAPON_PROF_TERMS[weapon.id]||[]).some(t=>wl.includes(t));
}
function hasArmorProf(armor){
  const cls=CLASSES.find(c=>c.id===state.class);
  if(!cls) return false;
  const a=cls.armor||'';
  if(!a||a==='None') return false;
  if(armor.cat==='shield') return a.includes('Shield');
  const al=a.toLowerCase();
  if(armor.cat==='light') return al.includes('light')||al.includes('all armor');
  if(armor.cat==='medium') return al.includes('medium')||al.includes('all armor');
  if(armor.cat==='heavy') return al.includes('heavy')||al.includes('all armor');
  return false;
}
function equipArmor(id){state.equipment.armorId=id;render();}
function toggleShield(){state.equipment.hasShield=!state.equipment.hasShield;render();}
function toggleWeapon(id){
  const idx=state.equipment.weapons.indexOf(id);
  if(idx>=0) state.equipment.weapons.splice(idx,1);
  else state.equipment.weapons.push(id);
  render();
}

function renderHPSection(){

  const hd=cls.hitDie;
  const conMod=getModNum(getEffectiveAbility('con'));
  const conStr=getMod(getEffectiveAbility('con'));
  const lv1=hd+conMod;
  const perLvAvg=Math.floor(hd/2)+1+conMod;
  const avgTotal=lv1+Math.max(0,state.level-1)*perLvAvg;
  const maxTotal=lv1+Math.max(0,state.level-1)*(hd+conMod);
  const isOverride=state.hpOverride!==null&&state.hpOverride!==undefined&&state.hpOverride!=='';
  const curHP=isOverride?state.hpOverride:avgTotal;
  const lvlBreakdown=state.level>1
    ?`<br><strong>Lv.2–${state.level}:</strong> +${perLvAvg} avg/level (d${hd} avg + CON ${conStr}), or roll 1–${hd} + CON`
    :'';
  return`<div class="section-card" style="margin-top:0;">
    <div class="section-title" style="font-size:14px;" data-tip="At level 1 you get the maximum value of your Hit Die + CON modifier. Each additional level add either the average (floor(hitDie/2)+1) or your rolled value, plus CON mod.">Hit Points</div>
    <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-start;">
      <div style="flex:1;min-width:200px;">
        <div style="font-size:13px;color:var(--ink-light);margin-bottom:8px;">
          <strong>Lv.1:</strong> d${hd} max + CON (${conStr}) = <strong>${lv1}</strong>${lvlBreakdown}
        </div>
        <div style="display:flex;gap:16px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border-col);border-radius:6px;">
          <div style="text-align:center;">
            <div style="font-family:'Cinzel',serif;font-size:10px;color:var(--muted);margin-bottom:2px;">AVERAGE</div>
            <div style="font-family:'Cinzel',serif;font-size:24px;font-weight:700;color:var(--spd-green);">${avgTotal}</div>
          </div>
          <div style="text-align:center;">
            <div style="font-family:'Cinzel',serif;font-size:10px;color:var(--muted);margin-bottom:2px;">MAX (all max rolls)</div>
            <div style="font-family:'Cinzel',serif;font-size:24px;font-weight:700;color:var(--hp-red);">${maxTotal}</div>
          </div>
          ${isOverride?`<div style="text-align:center;">
            <div style="font-family:'Cinzel',serif;font-size:10px;color:var(--muted);margin-bottom:2px;">YOUR HP</div>
            <div style="font-family:'Cinzel',serif;font-size:24px;font-weight:700;color:var(--gold);">${state.hpOverride}</div>
          </div>`:''}
        </div>
      </div>
      <div style="flex:1;min-width:200px;">
        <label style="font-size:13px;margin-bottom:6px;">${isOverride?'Custom HP (overrides average):':'Enter rolled HP total (optional):'}</label>
        <div style="display:flex;gap:8px;align-items:center;margin-top:4px;">
          <input type="number" id="hp-override-input" min="1" max="9999"
            placeholder="${avgTotal}"
            value="${isOverride?state.hpOverride:''}"
            style="width:110px;font-size:18px;font-family:'Cinzel',serif;font-weight:700;text-align:center;"/>
          ${isOverride?`<button class="btn-secondary" style="font-size:11px;padding:4px 9px;" onclick="state.hpOverride=null;render();">✕ Use Avg (${avgTotal})</button>`:''}
        </div>
        <p style="font-size:11px;color:var(--muted);margin-top:6px;font-style:italic;">Leave blank to use average (${avgTotal}). Enter your total if you rolled HP each level.</p>
      </div>
    </div>
  </div>`;
}

function renderAbilities(){
  const rb=getRaceBonus();
  const isPB=state.abilityMode==='pointbuy';
  const rem=pbRemaining(state.abilities);
  const spent=PB_MAX-rem;

  // Point buy counter color
  const ctrColor=rem===0?'var(--hp-red)':rem<0?'#a00':'var(--spd-green)';

  const abBoxes=STAT_NAMES.map(s=>{
    const base=state.abilities[s];
    const bon=rb[s]||0;
    const tot=base+bon;

    if(isPB){
      // +/- controls; clamp 8–15 in point buy mode
      const canDec=base>PB_SCORE_MIN;
      // Can increment only if score < 15 AND we have enough points for the next step
      const nextCost=(PB_COST[base+1]??999)-(PB_COST[base]??0);
      const canInc=base<PB_SCORE_MAX&&rem>=nextCost;
      return`<div class="ability-box" id="abbox-${s}">
        <div class="ability-name">${STAT_LABELS[s]}</div>
        <div style="display:flex;align-items:center;justify-content:center;gap:6px;margin:6px 0;">
          <button class="pb-btn" onclick="pbAdj('${s}',-1)"${canDec?'':' disabled'}>−</button>
          <span style="font-family:'Cinzel',serif;font-size:22px;font-weight:700;min-width:28px;text-align:center;">${tot}</span>
          <button class="pb-btn" onclick="pbAdj('${s}',1)"${canInc?'':' disabled'}>+</button>
        </div>
        <div style="font-size:10px;color:var(--muted);margin-bottom:2px;">${bon?`Base ${base} + ${bon} racial · `:''}Cost: ${pbCost(base)} pts</div>
        <div class="ability-modifier" id="mod-${s}">${getMod(tot)}</div>
      </div>`;
    } else {
      return`<div class="ability-box">
        <div class="ability-name">${STAT_LABELS[s]}</div>
        <input class="ability-score-input" type="number" min="1" max="20" value="${base}" id="ab-${s}" oninput="updateAb('${s}',this.value)"/>
        ${bon?`<div style="font-size:10px;color:var(--gold);margin-top:2px;">+${bon} racial → ${tot}</div>`:''}
        <div class="ability-modifier" id="mod-${s}">${getMod(tot)}</div>
      </div>`;
    }
  }).join('');

  return`<div class="section-card">
    <div class="section-title">Ability Scores</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center;">
      <button class="btn-secondary${state.abilityMode==='standard'?' mode-active':''}" style="font-size:11px;padding:5px 10px;" onclick="setArr([15,14,13,12,10,8],'standard')">Standard Array</button>
      <button class="btn-secondary${state.abilityMode==='balanced'?' mode-active':''}" style="font-size:11px;padding:5px 10px;" onclick="setArr([13,13,13,12,12,8],'balanced')">Balanced Array</button>
      <button class="btn-secondary${state.abilityMode==='pointbuy'?' mode-active':''}" style="font-size:11px;padding:5px 10px;" onclick="startPointBuy()" data-tip="PHB Point Buy — start with 8 in all stats, spend 27 points. Stats 8–13 cost 1 pt each; 14 costs 7 pts total, 15 costs 9 pts total. Max 15 before racial bonuses.">Point Buy (27 pts)</button>
      <button class="btn-secondary${state.abilityMode==='rolled'?' mode-active':''}" style="font-size:11px;padding:5px 10px;" onclick="rollAbs()">🎲 Roll 4d6 Drop Lowest</button>
    </div>
    ${isPB?`<div style="display:flex;align-items:center;gap:14px;padding:10px 14px;background:var(--surface2);border:1.5px solid ${ctrColor};border-radius:6px;margin-bottom:14px;">
      <div>
        <div style="font-family:'Cinzel',serif;font-size:26px;font-weight:700;color:${ctrColor};line-height:1;">${rem}</div>
        <div style="font-size:11px;color:var(--muted);letter-spacing:0.5px;font-family:'Cinzel',serif;">POINTS LEFT</div>
      </div>
      <div style="flex:1;">
        <div style="height:8px;background:var(--border-col);border-radius:4px;overflow:hidden;">
          <div style="height:100%;width:${Math.max(0,Math.min(100,(spent/PB_MAX)*100)).toFixed(1)}%;background:${rem===0?'var(--hp-red)':'var(--red-accent)'};transition:width 0.2s;border-radius:4px;"></div>
        </div>
        <div style="font-size:12px;color:var(--muted);margin-top:4px;">${spent} of ${PB_MAX} points spent · scores locked to 8–15</div>
      </div>
      <button class="btn-secondary" style="font-size:11px;padding:4px 10px;" onclick="startPointBuy()">Reset</button>
    </div>`:`<p style="font-size:13px;color:var(--muted);margin-bottom:12px;font-style:italic;">Enter scores manually, pick an array, or switch to Point Buy for the balanced 27-point system. Racial bonuses apply automatically.</p>`}
    <div class="ability-grid">${abBoxes}</div>
    <div class="stat-strip" style="margin-top:16px;">
      <div class="stat-badge hp"><div class="stat-badge-val" id="hp-val">${getMaxHP()}</div><div class="stat-badge-label">MAX HP</div></div>
      <div class="stat-badge ac"><div class="stat-badge-val" id="ac-val">${getAC()}</div><div class="stat-badge-label">AC</div></div>
      <div class="stat-badge spd"><div class="stat-badge-val">${getSpeed()}</div><div class="stat-badge-label">SPEED</div></div>
      <div class="stat-badge"><div class="stat-badge-val">+${getProfBonus(state.level)}</div><div class="stat-badge-label">PROF</div></div>
    </div>
  </div>
  ${renderHPSection()}
  <div class="nav-btns">
    <button class="btn-secondary" onclick="goStep(2)">← Back</button>
    <button class="btn-primary" onclick="goStep(4)">Next: Background →</button>
  </div>`;
}

function renderBackground(){
  const sel=state.background?BACKGROUNDS.find(b=>b.id===state.background):null;
  const totalBonusLangs=getTotalBonusLangCount();
  const grantedLangs=getRaceGrantedLanguages();
  const availLangs=LANGUAGES.filter(l=>!grantedLangs.includes(l));
  const raceBonus=getRaceBonusLangCount();
  const bgBonus=sel?sel.languages:0;

  let langSection='';
  if(sel&&totalBonusLangs>0){
    const parts=[];
    if(raceBonus>0) parts.push(`${raceBonus} from race`);
    if(bgBonus>0) parts.push(`${bgBonus} from background`);
    langSection=`<div class="section-card" style="margin-top:12px;">
      <div class="section-title" style="font-size:14px;">Language Proficiencies</div>
      <div class="info-box" style="margin-bottom:10px;"><strong>Already known:</strong> ${grantedLangs.join(', ')}</div>
      <p style="font-size:13px;margin-bottom:10px;">Choose <strong>${totalBonusLangs}</strong> additional language${totalBonusLangs>1?'s':''} (${parts.join(' + ')}) — ${state.bonusLanguages.length}/${totalBonusLangs} chosen:</p>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;">
        ${availLangs.map(lang=>{
          const isSel=state.bonusLanguages.includes(lang);
          const dis=!isSel&&state.bonusLanguages.length>=totalBonusLangs;
          return`<div class="choice-card${isSel?' selected':''}" onclick="${!dis||isSel?`toggleLanguage('${lang.replace(/'/g,"\\'")}')`:''}" style="${dis?'opacity:0.4;cursor:default;':''};padding:8px 10px;text-align:center;">
            <div style="font-size:13px;">${lang}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  let toolSection='';
  if(sel&&sel.toolChoices){
    toolSection=`<div class="section-card" style="margin-top:12px;">
      <div class="section-title" style="font-size:14px;">Tool Proficiency — ${sel.toolChoiceLabel}</div>
      <p style="font-size:13px;margin-bottom:10px;">Choose one:</p>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px;">
        ${sel.toolChoices.map(tool=>`<div class="choice-card${state.backgroundToolChoice===tool?' selected':''}" onclick="state.backgroundToolChoice='${tool.replace(/'/g,"\\'")}';render();" style="padding:8px 10px;text-align:center;">
          <div style="font-size:13px;">${tool}</div>
        </div>`).join('')}
      </div>
    </div>`;
  }

  return`<div class="section-card">
    <div class="section-title">Choose Your Background</div>
    <div class="background-grid">${BACKGROUNDS.map(b=>`<div class="choice-card${state.background===b.id?' selected':''}" onclick="selectBg('${b.id}')">
      <div class="choice-icon">${b.icon}</div><div class="choice-name">${b.name}</div>
      <div class="choice-sub">${b.skills.join(', ')}</div></div>`).join('')}</div>
    ${sel?`<div class="info-box"><strong>${sel.name}</strong><br>
      <strong>Skills:</strong> ${sel.skills.join(', ')}<br>
      ${sel.tools.length?`<strong>Tools:</strong> ${sel.tools.join(', ')}<br>`:''}
      ${sel.toolChoices?`<strong>Tool Choice:</strong> ${state.backgroundToolChoice||'— not yet chosen'}<br>`:''}
      ${totalBonusLangs>0?`<strong>Bonus Languages:</strong> +${totalBonusLangs} (${state.bonusLanguages.length} chosen)<br>`:''}
      <strong>Equipment:</strong> ${sel.equipment}<br>
      <strong>Feature:</strong> ${sel.feature}
    </div>`:'<div class="info-box">Select a background to see details.</div>'}
  </div>
  ${langSection}
  ${toolSection}
  <div class="nav-btns">
    <button class="btn-secondary" onclick="goStep(3)">← Back</button>
    <button class="btn-primary" onclick="goStep(5)"${!state.background?' disabled':''}>Next: Skills →</button>
  </div>`;
}

function renderSkills(){
  const cls=state.class?CLASSES.find(c=>c.id===state.class):null;
  const bg=state.background?BACKGROUNDS.find(b=>b.id===state.background):null;
  const sr=getSubrace();
  const prof=getProfBonus(state.level);
  const bgSk=bg?bg.skills:[];
  const srProfs=sr?sr.proficiencies||[]:[];
  const varSk=state.variantSkill?[state.variantSkill]:[];
  const heSk=state.halfElfSkills||[];
  const allGranted=[...new Set([...bgSk,...srProfs,...varSk,...heSk])];
  const classSk=cls?cls.skills:[];
  const numPicks=cls?cls.numSkills:2;
  const picked=state.skillProficiencies.filter(s=>classSk.includes(s));
  return`<div class="section-card">
    <div class="section-title">Skill Proficiencies</div>
    ${allGranted.length?`<p style="font-size:13px;color:var(--muted);margin-bottom:6px;"><strong>Auto-granted (★):</strong> ${allGranted.join(', ')}</p>`:''}
    ${cls?`<p style="font-size:13px;color:var(--ink-light);margin-bottom:12px;">Choose <strong>${numPicks}</strong> from class list — ${picked.length}/${numPicks} chosen:</p>`:''}
    <div class="skills-grid">${SKILLS_LIST.map(sk=>{
      const granted=allGranted.includes(sk.name);
      const isClass=classSk.includes(sk.name);
      const isChecked=state.skillProficiencies.includes(sk.name)||granted;
      const bon=getModNum(getEffectiveAbility(sk.stat))+(isChecked?prof:0);
      const bonStr=(bon>=0?'+':'')+bon;
      const clickable=isClass&&!granted;
      return`<div class="skill-row${clickable?' clickable':''}" data-tip="${SKILL_TIPS[sk.name]||sk.name}" onclick="${clickable?`toggleSk('${sk.name}')`:''}" >
        <span class="skill-tooltip">${SKILL_TIPS[sk.name]||''}</span>
        <div class="skill-check${isChecked?' checked':''}"></div>
        <div class="skill-name" style="color:${granted?'var(--gold)':isClass?'var(--ink)':'var(--muted)'}">
          ${sk.name}${granted?' ★':''}</div>
        <div class="skill-stat">${STAT_LABELS[sk.stat]}</div>
        <div class="skill-bonus">${bonStr}</div>
      </div>`;}).join('')}
    </div>
    <p class="prof-bonus-note">★ = Auto-granted | Class skills in full color | Prof bonus: <span data-tip="Proficiency Bonus — added to all proficient skill checks. +${prof} at your current level.">+${prof}</span></p>
  </div>
  <div class="nav-btns">
    <button class="btn-secondary" onclick="goStep(4)">← Back</button>
    <button class="btn-primary" onclick="goStep(6)">Next: Equipment →</button>
  </div>`;
}

function renderEquipment(){
  const cls=state.class?CLASSES.find(c=>c.id===state.class):null;
  const eq=state.equipment;
  const armorCats=[{key:'light',label:'Light Armor'},{key:'medium',label:'Medium Armor'},{key:'heavy',label:'Heavy Armor'}];
  const wpnCats=[{key:'simple_melee',label:'Simple — Melee'},{key:'simple_ranged',label:'Simple — Ranged'},{key:'martial_melee',label:'Martial — Melee'},{key:'martial_ranged',label:'Martial — Ranged'}];
  const shieldProf=cls&&(cls.armor.includes('Shield')||cls.armor.includes('Shields'));

  let armorHtml=`<div class="armor-grid">
    <div class="armor-card${!eq.armorId?' selected':''}" onclick="equipArmor(null)" style="display:flex;flex-direction:column;justify-content:center;">
      <div class="armor-name">Unarmored</div>
      <div class="armor-stat">AC ${getUnarmoredAC()}</div>
    </div>`;
  armorCats.forEach(({key,label})=>{
    armorHtml+=`<div style="grid-column:1/-1;margin-top:4px;"><span class="eq-section-label" style="font-size:10px;">${label}</span></div>`;
    ARMORS.filter(a=>a.cat===key).forEach(a=>{
      const prof=hasArmorProf(a);
      const sel=eq.armorId===a.id;
      armorHtml+=`<div class="armor-card${sel?' selected':''}${!prof?' no-prof':''}" onclick="equipArmor('${a.id}')">
        <span class="prof-badge" data-tip="${prof?'Proficient':'No proficiency — wearing non-proficient armor imposes disadvantage on STR/DEX checks and attack rolls, and prevents spellcasting'}">${prof?'✓':'⚠'}</span>
        <div class="armor-name">${a.name}</div>
        <div class="armor-stat">AC ${a.baseAC}${a.cat==='light'?'+DEX':a.cat==='medium'?'+DEX (max 2)':''}</div>
        <div class="armor-stat">${a.cost}${a.stealthDisadv?' · Stealth ⚠':''}</div>
      </div>`;
    });
  });
  armorHtml+=`</div>
  <div style="margin-top:8px;display:flex;align-items:center;gap:8px;">
    <div class="wpn-check${eq.hasShield?' checked':''}" onclick="toggleShield()" style="cursor:pointer;"></div>
    <span style="font-size:13px;cursor:pointer;" onclick="toggleShield()">Shield <span style="color:var(--muted);font-size:11px;">(+2 AC · 6 lb · 10 gp)</span></span>
    <span data-tip="${shieldProf?'Proficient with shields':'No shield proficiency — using without proficiency imposes disadvantage on attack rolls and ability checks'}" style="font-size:11px;cursor:help;">${shieldProf?'✓':'⚠'}</span>
  </div>`;

  let wpnHtml=`<table class="wpn-table"><thead><tr>
    <th></th><th>Weapon</th><th>Damage</th><th>Properties</th><th>Cost</th></tr></thead><tbody>`;
  wpnCats.forEach(({key,label})=>{
    wpnHtml+=`<tr style="pointer-events:none;"><td colspan="5" style="font-family:'Cinzel',serif;font-size:10px;color:var(--gold);letter-spacing:0.5px;padding-top:8px;padding-bottom:2px;">${label}</td></tr>`;
    WEAPONS.filter(w=>w.profCat===key).forEach(w=>{
      const prof=hasWeaponProf(w);
      const sel=eq.weapons.includes(w.id);
      wpnHtml+=`<tr class="${sel?'wpn-selected':''}${!prof?' no-prof':''}" onclick="toggleWeapon('${w.id}')">
        <td><div class="wpn-check${sel?' checked':''}"></div></td>
        <td>${w.name}${!prof?` <span data-tip="No proficiency — attacks with this weapon don't add your proficiency bonus" style="font-size:10px;cursor:help;">⚠</span>`:''}</td>
        <td style="font-family:'Cinzel',serif;font-size:11px;">${w.dmg} <span style="color:var(--muted);font-style:italic;">${w.dmgType}</span></td>
        <td style="color:var(--muted);font-style:italic;font-size:11px;">${w.props}</td>
        <td style="color:var(--muted);font-size:11px;">${w.cost}</td>
      </tr>`;
    });
  });
  wpnHtml+=`</tbody></table>`;

  const packChoices=cls?cls.packChoices||[]:[];
  const otherEquip=cls?cls.equipment||[]:[];
  const packSection=packChoices.length?`<div class="section-card" style="margin-bottom:16px;">
    <div class="section-title" style="font-size:14px;">Starting Equipment Pack</div>
    ${otherEquip.length?`<div class="info-box" style="margin-bottom:12px;"><strong>Also included:</strong><ul style="margin:4px 0 0 0;padding-left:18px;">${otherEquip.map(e=>`<li style="font-size:13px;">${e}</li>`).join('')}</ul></div>`:''}
    <p style="font-size:13px;margin-bottom:10px;">Choose one pack:</p>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;">
      ${packChoices.map(pack=>`<div class="choice-card${state.equipmentPack===pack?' selected':''}" onclick="state.equipmentPack='${pack.replace(/'/g,"\\'")}';render();" style="padding:12px;text-align:left;">
        <div style="font-family:'Cinzel',serif;font-size:13px;margin-bottom:6px;">${pack}</div>
        <div style="font-size:11px;color:var(--muted);line-height:1.5;">${EQUIPMENT_PACKS[pack]||''}</div>
      </div>`).join('')}
    </div>
  </div>`:'';

  return`${packSection}<div class="section-card">
    <div class="section-title">Equipment</div>
    <div class="ac-preview">
      <div class="ac-preview-val">${getAC()}</div>
      <div>
        <div style="font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;color:var(--muted);margin-bottom:2px;">ARMOR CLASS</div>
        <div style="font-size:12px;color:var(--ink-light);">${getACBreakdown()}</div>
      </div>
    </div>
    <div class="eq-section">
      <div class="eq-section-label">Armor${cls?` <span style="font-weight:400;color:var(--muted);font-size:10px;font-family:'Crimson Text',serif;letter-spacing:0;">— class proficiencies: ${cls.armor}</span>`:''}
      </div>
      ${armorHtml}
    </div>
    <div class="eq-section" style="margin-top:16px;">
      <div class="eq-section-label">Weapons${cls?` <span style="font-weight:400;color:var(--muted);font-size:10px;font-family:'Crimson Text',serif;letter-spacing:0;">— class proficiencies: ${cls.weapons}</span>`:''}
      </div>
      ${wpnHtml}
    </div>
  </div>
  <div class="nav-btns">
    <button class="btn-secondary" onclick="goStep(5)">← Back</button>
    <button class="btn-primary" onclick="goStep(7)">View Character Sheet →</button>
  </div>`;
}

function renderSummary(){
  const race=state.race?RACES.find(r=>r.id===state.race):null;
  const sr=getSubrace();
  const cls=state.class?CLASSES.find(c=>c.id===state.class):null;
  const bg=state.background?BACKGROUNDS.find(b=>b.id===state.background):null;
  const prof=getProfBonus(state.level);
  const bgSk=bg?bg.skills:[];
  const srProfs=sr?sr.proficiencies||[]:[];
  const varSk=state.variantSkill?[state.variantSkill]:[];
  const heSk=state.halfElfSkills||[];
  const allGranted=[...new Set([...bgSk,...srProfs,...varSk,...heSk])];
  const feat=state.variantFeat?PHB_FEATS.find(f=>f.id===state.variantFeat):null;
  const raceName=sr?(race&&race.subraces.length>1?`${sr.name} ${race.name}`:race.name):(race?race.name:'?');
  return`<div class="character-sheet">
    <div class="sheet-header">
      <div>
        <div class="char-name-display">${state.name||'Unnamed Hero'}</div>
        <div class="char-meta">${raceName} ${cls?cls.name:'?'} · Level ${state.level}<br>${bg?bg.name:''} · ${state.alignment}${state.appearance?` · ${state.appearance}`:''}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;">
        <div class="stat-badge hp" style="min-width:80px;" data-tip="Maximum Hit Points — Level 1: Hit Die max + CON mod. Each additional level: floor(Hit Die / 2) + 1 + CON mod (average), or your rolled value if overridden manually."><div class="stat-badge-val">${getMaxHP()}</div><div class="stat-badge-label">MAX HP</div></div>
        <div style="display:flex;gap:6px;">
          <div class="stat-badge ac" data-tip="Armor Class — how hard you are to hit. Attackers must roll this number or higher on a d20 to land an attack."><div class="stat-badge-val">${getAC()}</div><div class="stat-badge-label">AC</div></div>
          <div class="stat-badge spd" data-tip="Movement Speed — feet you can move per turn. Difficult terrain costs 2 ft per 1 ft moved. The Dash action doubles your movement."><div class="stat-badge-val">${getSpeed()}</div><div class="stat-badge-label">FT</div></div>
          <div class="stat-badge" data-tip="Proficiency Bonus — added to attack rolls, saving throws, and skill/tool checks you are proficient in. Scales with character level (+2 at Lv1, up to +6 at Lv17+)."><div class="stat-badge-val">+${prof}</div><div class="stat-badge-label">PROF</div></div>
        </div>
      </div>
    </div>
    <div class="sheet-cols">
      <div>
        <div class="section-title" style="font-size:13px;margin-bottom:10px;">Ability Scores</div>
        <div class="ability-display-grid">${STAT_NAMES.map(s=>{const t=getEffectiveAbility(s);return`
          <div class="ability-display-box" data-tip="${{str:'Strength — melee attacks &amp; damage, Athletics, carrying capacity, STR saves.',dex:'Dexterity — ranged attacks, AC (light/unarmored), Acrobatics/Stealth, initiative, DEX saves.',con:'Constitution — HP maximum, concentration saves, CON saves.',int:'Intelligence — Arcana/History/Investigation/Nature/Religion, wizard spellcasting, INT saves.',wis:'Wisdom — Insight/Medicine/Perception/Survival, cleric &amp; druid spellcasting, WIS saves.',cha:'Charisma — Deception/Intimidation/Performance/Persuasion, bard/sorcerer/warlock spellcasting, CHA saves.'}[s]}">
            <div class="ability-display-name">${STAT_LABELS[s]}</div>
            <div class="ability-display-score">${t}</div>
            <div class="ability-display-mod">${getMod(t)}</div>
          </div>`;}).join('')}</div>
        ${cls?`<div style="margin-top:14px;"><div class="section-title" style="font-size:13px;margin-bottom:6px;">Saving Throws</div>
          ${STAT_NAMES.map(s=>{const iS=cls.saves.includes(s);const m=getModNum(getEffectiveAbility(s))+(iS?prof:0);
            return`<div style="display:flex;justify-content:space-between;font-size:13px;padding:3px 0;border-bottom:1px dashed var(--border-col);">
              <span style="color:${iS?'var(--ink)':'var(--muted)'};">${iS?'●':'○'} ${STAT_LABELS[s]}</span>
              <span style="font-family:'Cinzel',serif;font-weight:600;color:var(--red-accent);">${(m>=0?'+':'')+m}</span></div>`;}).join('')}
        </div>`:''}
        ${sr?`<div style="margin-top:14px;"><div class="section-title" style="font-size:13px;margin-bottom:6px;" data-tip="Racial traits are innate abilities from your race and subrace. They are always active and require no action unless specified.">Racial Traits</div>
          ${sr.traits.map(t=>`<p class="trait-item">• ${t}</p>`).join('')}
          <p class="trait-item" style="margin-top:4px;"><strong>Languages:</strong> ${sr.languages.join(', ')}</p>
        </div>`:''}
        ${feat?`<div style="margin-top:14px;"><div class="section-title" style="font-size:13px;margin-bottom:6px;">Feat: ${feat.name}</div>
          <p class="trait-item">${feat.desc}</p></div>`:''}
      </div>
      <div>
        <div class="section-title" style="font-size:13px;margin-bottom:8px;">Skills</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-bottom:14px;">
          ${SKILLS_LIST.map(sk=>{const ip=state.skillProficiencies.includes(sk.name)||allGranted.includes(sk.name);const m=getModNum(getEffectiveAbility(sk.stat))+(ip?prof:0);
            return`<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 4px;${ip?'color:var(--ink);font-weight:600;':'color:var(--muted);'}">
              <span>${ip?'●':'○'} ${sk.name}</span>
              <span style="font-family:'Cinzel',serif;color:var(--red-accent);">${(m>=0?'+':'')+m}</span></div>`;}).join('')}
        </div>
        ${state.personalityTrait||state.ideals||state.bonds||state.flaws?`<div style="margin-bottom:12px;">
          <div class="section-title" style="font-size:13px;margin-bottom:6px;">Personality</div>
          ${state.personalityTrait?`<p class="trait-item"><strong>Traits:</strong> ${state.personalityTrait}</p>`:''}
          ${state.ideals?`<p class="trait-item"><strong>Ideals:</strong> ${state.ideals}</p>`:''}
          ${state.bonds?`<p class="trait-item"><strong>Bonds:</strong> ${state.bonds}</p>`:''}
          ${state.flaws?`<p class="trait-item"><strong>Flaws:</strong> ${state.flaws}</p>`:''}
        </div>`:''}
        ${cls?`<div style="margin-bottom:12px;"><div class="section-title" style="font-size:13px;margin-bottom:6px;">Class: ${cls.name}</div>
          <p class="trait-item">• Hit Die: d${cls.hitDie} · Armor: ${cls.armor}</p>
          <p class="trait-item">• Weapons: ${cls.weapons}</p>
          ${cls.spellcasting?`<p class="trait-item">• Spellcasting: ${STAT_LABELS[cls.spellAbility]}-based</p>`:''}
          ${cls.equipment.map(e=>`<p class="trait-item" style="padding-left:8px;">• ${e}</p>`).join('')}
        </div>`:''}
        ${bg?`<div style="margin-bottom:12px;"><div class="section-title" style="font-size:13px;margin-bottom:6px;">Background: ${bg.name}</div>
          <p class="trait-item"><strong>Feature:</strong> ${bg.feature}</p>
          ${bg.tools.length?`<p class="trait-item"><strong>Tools:</strong> ${bg.tools.join(', ')}</p>`:''}
          ${bg.languages?`<p class="trait-item"><strong>Extra Languages:</strong> ${bg.languages}</p>`:''}
          <p class="trait-item"><strong>Equipment:</strong> ${bg.equipment}</p>
        </div>`:''}
        <div><div class="section-title" style="font-size:13px;margin-bottom:6px;">Equipment</div>
          <p class="trait-item">• <strong>Armor:</strong> ${state.equipment.armorId?(ARMORS.find(a=>a.id===state.equipment.armorId)||{name:state.equipment.armorId}).name:'Unarmored'}${state.equipment.hasShield?' + Shield':''}</p>
          ${state.equipment.weapons.length?`<p class="trait-item">• <strong>Weapons:</strong> ${state.equipment.weapons.map(id=>{const w=WEAPONS.find(ww=>ww.id===id);return w?`${w.name} (${w.dmg} ${w.dmgType})`:id;}).join(', ')}</p>`:'<p class="trait-item" style="color:var(--muted);">• No weapons selected</p>'}
        </div>
      </div>
    </div>
  </div>
  <div class="nav-btns">
    <button class="btn-secondary" onclick="goStep(6)">← Back</button>
    <div style="display:flex;gap:8px;">
      <button class="btn-primary" onclick="openInTracker()" style="background:var(--gold);color:#1a0a00;border-color:var(--gold);">▶ Open in Tracker</button>
      <button class="btn-secondary" onclick="exportCharacter()" style="border-color:var(--gold);color:var(--gold-light);">⬇ Export JSON</button>
      <label class="btn-secondary" style="cursor:pointer;display:inline-block;" title="Load an existing character JSON back into the builder">
        📂 Import Character
        <input type="file" accept=".json" onchange="importCharacter(this)" style="display:none;"/>
      </label>
      <button class="btn-primary" onclick="window.print()">🖨 Print / Save PDF</button>
    </div>
  </div>`;
}

function attachEvents(){
  const b=(id,p)=>{const e=document.getElementById(id);if(e)e.oninput=ev=>{state[p]=ev.target.value;};};
  b('inp-name','name');b('inp-appearance','appearance');b('inp-trait','personalityTrait');
  b('inp-ideals','ideals');b('inp-bonds','bonds');b('inp-flaws','flaws');b('inp-backstory','backstory');
  const l=document.getElementById('inp-level');if(l)l.onchange=e=>{state.level=parseInt(e.target.value);render();};
  const a=document.getElementById('inp-alignment');if(a)a.onchange=e=>{state.alignment=e.target.value;};
  const hpEl=document.getElementById('hp-override-input');if(hpEl)hpEl.oninput=function(){state.hpOverride=this.value===''?null:parseInt(this.value)||null;const hv=document.getElementById('hp-val');if(hv)hv.textContent=getMaxHP();};
}

function getRaceGrantedLanguages(){
  const sr=getSubrace();
  if(!sr||!sr.languages) return ['Common'];
  return sr.languages.filter(l=>!l.toLowerCase().includes('choice'));
}
function getRaceBonusLangCount(){
  const sr=getSubrace();
  if(!sr||!sr.languages) return 0;
  return sr.languages.filter(l=>l.toLowerCase().includes('choice')).length;
}
function getTotalBonusLangCount(){
  const bg=state.background?BACKGROUNDS.find(b=>b.id===state.background):null;
  return getRaceBonusLangCount()+(bg?bg.languages:0);
}
function getAllKnownLanguages(){
  const granted=getRaceGrantedLanguages();
  const chosen=state.bonusLanguages.slice(0,getTotalBonusLangCount());
  return [...new Set([...granted,...chosen])];
}
function toggleLanguage(lang){
  const i=state.bonusLanguages.indexOf(lang);
  if(i>=0){state.bonusLanguages.splice(i,1);}
  else if(state.bonusLanguages.length<getTotalBonusLangCount()){state.bonusLanguages.push(lang);}
  render();
}

function selectRace(id){
  if(state.race===id)return;
  state.race=id;state.subrace=null;state.variantASI=[];state.halfElfASI=[];
  state.variantSkill=null;state.variantFeat=null;state.halfElfSkills=[];
  state.bonusLanguages=[];
  const r=RACES.find(r=>r.id===id);
  if(r&&r.subraces.length===1)state.subrace=r.subraces[0].id;
  render();
}
function selectSubrace(id){
  state.subrace=id;state.variantASI=[];state.halfElfASI=[];
  state.variantSkill=null;state.variantFeat=null;state.halfElfSkills=[];
  state.bonusLanguages=[];
  render();
}
function selectClass(id){state.class=id;state.skillProficiencies=[];state.equipmentPack=null;render();}
function selectBg(id){state.background=id;state.bonusLanguages=[];state.backgroundToolChoice=null;render();}

function toggleVarASI(s){
  const i=state.variantASI.indexOf(s);
  if(i>-1)state.variantASI.splice(i,1);
  else if(state.variantASI.length<2)state.variantASI.push(s);
  render();
}
function toggleHalfElfASI(s){
  const i=state.halfElfASI.indexOf(s);
  if(i>-1)state.halfElfASI.splice(i,1);
  else if(state.halfElfASI.length<2)state.halfElfASI.push(s);
  render();
}
function toggleHalfElfSkill(s){
  const i=state.halfElfSkills.indexOf(s);
  if(i>-1)state.halfElfSkills.splice(i,1);
  else if(state.halfElfSkills.length<2)state.halfElfSkills.push(s);
  render();
}

function updateAb(stat,val){
  const v=Math.max(1,Math.min(20,parseInt(val)||1));
  state.abilities[stat]=v;
  const bon=getRaceBonus()[stat]||0;
  const tot=v+bon;
  const me=document.getElementById('mod-'+stat);if(me)me.textContent=getMod(tot);
  const he=document.getElementById('hp-val');if(he)he.textContent=getMaxHP();
  const ae=document.getElementById('ac-val');if(ae)ae.textContent=getAC();
}

function toggleSk(n){
  const cls=state.class?CLASSES.find(c=>c.id===state.class):null;if(!cls)return;
  const np=cls.numSkills;if(!cls.skills.includes(n))return;
  const i=state.skillProficiencies.indexOf(n);
  if(i>-1)state.skillProficiencies.splice(i,1);
  else{const p=state.skillProficiencies.filter(s=>cls.skills.includes(s));if(p.length>=np)return;state.skillProficiencies.push(n);}
  render();
}

function setArr(a,mode){state.abilityMode=mode||'free';STAT_NAMES.forEach((s,i)=>{state.abilities[s]=a[i]||10;});render();}
function rollAbs(){
  state.abilityMode='rolled';
  function r(){const d=[0,0,0,0].map(()=>Math.floor(Math.random()*6)+1);d.sort((a,b)=>a-b);return d.slice(1).reduce((a,b)=>a+b,0);}
  STAT_NAMES.forEach(s=>{state.abilities[s]=r();});render();
}
function startPointBuy(){
  state.abilityMode='pointbuy';
  STAT_NAMES.forEach(s=>{state.abilities[s]=8;});render();
}
function pbAdj(stat,dir){
  const cur=state.abilities[stat];
  const next=cur+dir;
  if(next<PB_SCORE_MIN||next>PB_SCORE_MAX)return;
  const delta=(PB_COST[next]??0)-(PB_COST[cur]??0);
  const rem=pbRemaining(state.abilities);
  if(delta>rem)return;
  state.abilities[stat]=next;
  render();
}

function buildExportData(){
  const sr=getSubrace();
  const cls=CLASSES.find(c=>c.id===state.class);
  const bg=BACKGROUNDS.find(b=>b.id===state.background);
  const race=RACES.find(r=>r.id===state.race);
  const bgSk=bg?bg.skills:[];
  const srProfs=sr?sr.proficiencies||[]:[];
  const varSk=state.variantSkill?[state.variantSkill]:[];
  const heSk=state.halfElfSkills||[];
  const allGranted=[...new Set([...bgSk,...srProfs,...varSk,...heSk])];
  const allSkillProfs=[...new Set([...state.skillProficiencies,...allGranted])];
  const feat=state.variantFeat?PHB_FEATS.find(f=>f.id===state.variantFeat):null;
  return {
    version:1,
    ruleset:state.ruleset||'phb2014',
    meta:{exportedAt:new Date().toISOString()},
    identity:{name:state.name||'Unnamed Hero',alignment:state.alignment,appearance:state.appearance,personalityTrait:state.personalityTrait,ideals:state.ideals,bonds:state.bonds,flaws:state.flaws,backstory:state.backstory||''},
    languages:getAllKnownLanguages(),
    race:{id:state.race,subraceId:state.subrace,name:sr?sr.name:'',raceName:race?race.name:''},
    class:{id:state.class,name:cls?cls.name:'',hitDie:cls?cls.hitDie:8,spellcasting:cls?cls.spellcasting:false,spellAbility:cls?cls.spellAbility:null,saves:cls?cls.saves:[]},
    background:{id:state.background,name:bg?bg.name:''},
    level:state.level,
    abilityMode:state.abilityMode,
    baseAbilities:{...state.abilities},
    racialBonuses:getRaceBonus(),
    effectiveAbilities:Object.fromEntries(STAT_NAMES.map(s=>[s,getEffectiveAbility(s)])),
    skillProficiencies:allSkillProfs,
    variantSkill:state.variantSkill||null,
    halfElfSkills:state.halfElfSkills||[],
    feats:feat?[{id:feat.id,name:feat.name,desc:feat.desc}]:[],
    toolProficiency:state.backgroundToolChoice||null,
    equipmentPack:state.equipmentPack||null,
    hp:{max:getMaxHP(),current:getMaxHP(),override:state.hpOverride??null},
    ac:getAC(),
    speed:getSpeed(),
    proficiencyBonus:getProfBonus(state.level),
    equipment:{
      armorId:state.equipment.armorId,
      armorName:state.equipment.armorId?(ARMORS.find(a=>a.id===state.equipment.armorId)||{name:state.equipment.armorId}).name:null,
      hasShield:state.equipment.hasShield,
      weapons:[...state.equipment.weapons],
      weaponDetails:state.equipment.weapons.map(id=>{const w=WEAPONS.find(ww=>ww.id===id);return w?{id:w.id,name:w.name,dmg:w.dmg,dmgType:w.dmgType,props:w.props,profCat:w.profCat,proficient:hasWeaponProf(w)}:{id,name:id};}),
    },
    tracker:{currentHP:getMaxHP(),tempHP:0,deathSaves:{successes:0,failures:0},conditions:[],exhaustion:0,currency:{cp:0,sp:0,gp:0,pp:0},inventory:[],notes:[],sessionLog:[],asiChoices:[],featChoices:[],subclass:null,classFeatures:[]}
  };
}

function showToast(msg,type='info'){
  let c=document.getElementById('toast-container');
  if(!c){c=document.createElement('div');c.id='toast-container';document.body.appendChild(c);}
  const t=document.createElement('div');
  t.className='toast'+(type?` ${type}`:'');
  t.textContent=msg;
  c.appendChild(t);
  setTimeout(()=>t.remove(),2600);
}

function exportCharacter(){
  const exportData=buildExportData();
  const blob=new Blob([JSON.stringify(exportData,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`${(state.name||'character').replace(/\s+/g,'_').toLowerCase()}_dnd5e.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`${exportData.identity.name} exported successfully.`,'success');
}

function openInTracker(){
  try{
    const data=buildExportData();
    localStorage.setItem('dnd5e_pending_import',JSON.stringify(data));
    window.location.href='tracker.html';
  }catch(e){
    alert('Could not open tracker: '+e.message);
  }
}


function importCharacter(input){
  if(!input||!input.files||!input.files[0]) return;
  const reader=new FileReader();
  reader.onload=function(e){
    input.value=''; // reset so same file can be re-selected
    var data;
    try{ data=JSON.parse(e.target.result); }
    catch(err){ alert('Could not read file — make sure it is a valid JSON file.'); return; }

    try{
      // ── Map exported JSON back into builder state ──────────────────────────
      const d=data;

      // Identity
      if(d.identity){
        state.name            = d.identity.name            || '';
        state.alignment       = d.identity.alignment       || 'True Neutral';
        state.appearance      = d.identity.appearance      || '';
        state.personalityTrait= d.identity.personalityTrait|| '';
        state.ideals          = d.identity.ideals          || '';
        state.bonds           = d.identity.bonds           || '';
        state.flaws           = d.identity.flaws           || '';
      }

      // Level
      if(d.level) state.level = Math.max(1, Math.min(20, parseInt(d.level)||1));

      // Race + subrace
      if(d.race){
        state.race    = d.race.id     || null;
        state.subrace = d.race.subraceId || null;

        // Reconstruct variant human ASI choices from racialBonuses
        if(d.race.subraceId==='human_var' && d.racialBonuses){
          // Variant human gets +1 to two chosen stats
          state.variantASI = Object.entries(d.racialBonuses)
            .filter(([,v])=> v>0)
            .map(([k])=>k);
        }

        // Reconstruct half-elf ASI choices (+2 CHA is auto; other two are chosen)
        if(d.race.subraceId==='halfelf_std' && d.racialBonuses){
          state.halfElfASI = Object.entries(d.racialBonuses)
            .filter(([k,v])=> k!=='cha' && v>0)
            .map(([k])=>k);
        }
      }

      // Class
      if(d.class) state.class = d.class.id || null;

      // Background
      if(d.background) state.background = d.background.id || null;

      // Base abilities
      if(d.baseAbilities){
        state.abilities = {
          str: d.baseAbilities.str||10,
          dex: d.baseAbilities.dex||10,
          con: d.baseAbilities.con||10,
          int: d.baseAbilities.int||10,
          wis: d.baseAbilities.wis||10,
          cha: d.baseAbilities.cha||10,
        };
        // Restore abilityMode — use stored value if present, otherwise auto-detect
        if(d.abilityMode==='pointbuy'){
          state.abilityMode='pointbuy';
        } else if(['standard','balanced','rolled','free'].includes(d.abilityMode)){
          state.abilityMode=d.abilityMode;
        } else {
          // Auto-detect: if all base scores are 8-15 and total cost fits in 27pts, treat as point buy
          const abs=state.abilities;
          const inRange=Object.values(abs).every(v=>v>=8&&v<=15);
          const cost=Object.values(abs).reduce((t,v)=>t+(PB_COST[v]??0),0);
          state.abilityMode=(inRange&&cost<=PB_MAX)?'pointbuy':'free';
        }
      }

      // Skills — always start fresh so the Skills step re-derives from class/race/background
      state.skillProficiencies = [];

      // Variant human free skill — now stored directly in export
      state.variantSkill = d.variantSkill || null;

      // Half-elf bonus skills — now stored directly in export
      state.halfElfSkills = Array.isArray(d.halfElfSkills) ? d.halfElfSkills : [];

      // Variant human feat
      if(Array.isArray(d.feats)&&d.feats.length>0){
        state.variantFeat = d.feats[0].id || null;
      } else {
        state.variantFeat = null;
      }

      // Restore HP override
      state.hpOverride=d.hp&&d.hp.override!=null?d.hp.override:null;

      // Restore equipment
      if(d.equipment){
        state.equipment={
          armorId:d.equipment.armorId||null,
          hasShield:!!d.equipment.hasShield,
          weapons:Array.isArray(d.equipment.weapons)?[...d.equipment.weapons]:[],
        };
      } else {
        state.equipment={armorId:null,hasShield:false,weapons:[]};
      }

      // Navigate to step 0 and re-render
      state.step=0;
      render();
      alert('Character imported successfully! Review any choices, then re-export when ready.');
    }catch(err){
      alert('Error loading character: '+err.message);
    }
  };
  reader.readAsText(input.files[0]);
}

render();
</script>

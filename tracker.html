  const bonusStr=(atkBonus>=0?'+':'')+atkBonus;

  return`<div style="border:1px solid var(--border);border-radius:6px;margin-bottom:6px;overflow:hidden;">
    <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface);">
      <div style="flex:1;">
        <div style="font-family:'Cinzel',serif;font-size:13px;font-weight:600;color:var(--ink);">${atk.name}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px;">${atk.range||'5 ft'} · ${atk.dmgType||''}</div>
      </div>
      <div style="text-align:center;min-width:50px;">
        <div style="font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--red);">${bonusStr}</div>
        <div style="font-size:9px;color:var(--muted);letter-spacing:0.5px;">TO HIT</div>
      </div>
      <div style="text-align:center;min-width:70px;padding:0 8px;border-left:1px solid var(--border);">
        <div style="font-family:'Cinzel',serif;font-size:14px;font-weight:600;color:var(--ac-blue);">${dmgStr}</div>
        <div style="font-size:9px;color:var(--muted);">${atk.dmgType||'damage'}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:3px;">
        <button onclick="rollAttack('${atk.id||atk.name}','${atk.dmgDice}',${atkBonus},${dmgBonus})" style="font-family:'Cinzel',serif;font-size:10px;padding:4px 8px;background:var(--red);color:#fff;border:none;border-radius:3px;cursor:pointer;">🎲 Roll</button>
        ${isCustom?`<button onclick="deleteCustomAtk('${atk.id}')" style="font-size:10px;padding:3px 8px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);border-radius:3px;cursor:pointer;">✕</button>`:''}
      </div>
    </div>
    ${atk.notes?`<div style="padding:6px 12px;border-top:1px solid var(--border);font-size:12px;color:var(--ink-light);background:var(--parchment);font-style:italic;">${atk.notes}</div>`:''}

}

    <div style="display:flex;flex-direction:column;gap:8px;">

            ${['str','dex','con','int','wis','cha'].map(s=>`<option value="${s}"${atkForm.abilityKey===s?' selected':''}>${s.toUpperCase()} (${getMod(eff[s]||10)})</option>`).join('')}

        </div>
        <div><label>Proficient</label>
          <select onchange="atkForm.proficient=this.value==='true';render();" style="width:100%;">

        </div>
      </div>
      <div class="row cols-2" style="gap:8px;margin:0;">

        <div><label>Damage Type</label><input type="text" value="${atkForm.dmgType}" oninput="atkForm.dmgType=this.value;" placeholder="slashing"/></div>
      </div>
      <div><label>Range</label><input type="text" id="atk-range" value="${atkForm.range||''}" oninput="atkForm.range=this.value;" placeholder="5 ft or 80/320 ft"/></div>
      <div><label>Notes</label><input type="text" value="${atkForm.notes}" oninput="atkForm.notes=this.value;" placeholder="Special rules, conditions..."/></div>
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:6px 10px;font-size:12px;color:var(--ink-light);">
        Preview: <strong>${(previewBonus>=0?'+':'')+previewBonus} to hit</strong> · <strong>${atkForm.dmgDice||'?'}${previewDmg>=0?'+'+previewDmg:(previewDmg||'')} ${atkForm.dmgType}</strong>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-red btn-sm" onclick="saveCustomAtk()">Save Attack</button>
        <button class="btn btn-ghost btn-sm" onclick="showAddAtk=false;render();">Cancel</button>
      </div>
    </div>
  </div>`;
}

function rollAttack(name, dmgDice, atkBonus, dmgBonus){
  const atkRoll=Math.floor(Math.random()*20)+1;
  const dmgResult=rollDiceNotation(dmgDice, dmgBonus);
  const isCrit=atkRoll===20;
  const isMiss=atkRoll===1;
  rollResult={
    name,
    atkRoll,
    atkBonus:(atkBonus||0),
    atkTotal:atkRoll+(atkBonus||0),
    isCrit,isMiss,
    dmgDice,dmgBonus,
    dmgTotal:isCrit?(dmgResult?dmgResult.total*2:0):(dmgResult?dmgResult.total:0),
    dmgRolls:dmgResult?dmgResult.rolls:[],
    timestamp:Date.now(),
  };
  render();
}

function rollCheck(label, mod){
  const roll=Math.floor(Math.random()*20)+1;
  const total=roll+(mod||0);
  rollResult={
    name:label, isCheck:true,
    atkRoll:roll, atkBonus:(mod||0), atkTotal:total,
    isCrit:roll===20, isMiss:false,
    dmgDice:null, dmgBonus:0, dmgTotal:null, dmgRolls:[],
    timestamp:Date.now(),
  };
  render();
}

function renderRollResult(){
  const r=rollResult;
  if(!r) return '';
  const color=r.isCrit?'var(--spd-green)':r.isMiss?'var(--hp-red)':'var(--ink)';
  const rollLabel=r.isCheck?'RESULT':'TO HIT';
  return`<div style="position:fixed;bottom:20px;right:20px;background:var(--surface);border:2px solid ${color};border-radius:8px;padding:1rem;min-width:200px;box-shadow:0 4px 16px rgba(0,0,0,0.2);z-index:500;">
    <div style="display:flex;justify-content:space-between;align-items:start;">
      <div style="font-family:'Cinzel',serif;font-size:12px;color:var(--muted);">${r.name}</div>
      <button onclick="rollResult=null;render();" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;">✕</button>
    </div>
    <div style="display:flex;gap:16px;margin-top:6px;">
      <div style="text-align:center;">
        <div class="dice-number" style="font-family:'Cinzel',serif;font-size:32px;font-weight:700;color:${color};">${r.isMiss?'Miss':r.atkTotal}</div>
        <div style="font-size:10px;color:var(--muted);">d20(${r.atkRoll})${r.atkBonus>=0?'+':''}${r.atkBonus||0}${r.isCrit?' CRITICAL!':r.isMiss?' FUMBLE!':''}</div>
        <div style="font-size:10px;color:var(--gold);">${rollLabel}</div>
      </div>
      ${!r.isCheck&&!r.isMiss&&r.dmgTotal!=null?`<div style="text-align:center;border-left:1px solid var(--border);padding-left:16px;">
        <div class="dice-number" style="font-family:'Cinzel',serif;font-size:32px;font-weight:700;color:var(--ac-blue);">${r.dmgTotal}</div>
        <div style="font-size:10px;color:var(--muted);">${r.dmgDice}${r.dmgBonus>=0?'+':''}${r.dmgBonus||0}${r.isCrit?' ×2':''}</div>
        <div style="font-size:10px;color:var(--gold);">DAMAGE</div>
      </div>`:''}
    </div>
  </div>`;
}

// ── DIVINE SMITE ──────────────────────────────────────────────────────────────
function renderSmiteDialog(){
  const res=char.tracker.resources||{};
  const lvl=char.level;
  const eff=char.effectiveAbilities;

  let slots=[];
  if(res.spellSlots){
    res.spellSlots.forEach(([cur,max],i)=>{
      if(max>0&&cur>0) slots.push({level:i+1,cur,max});
    });
  }

  const smiteDice={1:'2d8',2:'3d8',3:'4d8',4:'5d8',5:'5d8'};

  return`<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;" onclick="smiteDialogOpen=false;render()">
    <div style="background:var(--surface);border:2px solid var(--border);border-radius:10px;padding:1.5rem;max-width:380px;width:90%;" onclick="event.stopPropagation()">
      <div style="font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--red);margin-bottom:4px;">⚡ Divine Smite</div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:12px;">After hitting with a melee weapon attack, expend a spell slot. Deal 2d8 radiant damage per slot level (+1d8 vs undead/fiends, max 5d8).</p>
      ${slots.length>0?`<div style="display:flex;flex-direction:column;gap:6px;">
        ${slots.map(s=>`<button onclick="smite(${s.level})" class="btn btn-ghost" style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;">
          <span style="font-family:'Cinzel',serif;">${ordinal(s.level)}-Level Slot <span style="font-size:11px;color:var(--muted);">[${s.cur}/${s.max} left]</span></span>
          <span style="color:var(--red);font-weight:600;">${smiteDice[s.level]||'5d8'} radiant</span>
        </button>`).join('')}
      </div>`:
      `<p style="color:var(--hp-red);font-style:italic;">No spell slots remaining.</p>`}
      <button class="btn btn-ghost btn-sm" style="margin-top:10px;" onclick="smiteDialogOpen=false;render()">Cancel</button>
    </div>
  </div>`;
}

function smite(slotLevel){
  const res=char.tracker.resources;
  const slot=res.spellSlots&&res.spellSlots[slotLevel-1];
  if(slot&&slot[0]>0){
    res.spellSlots[slotLevel-1]=[slot[0]-1,slot[1]];
    const dice={1:'2d8',2:'3d8',3:'4d8',4:'5d8',5:'5d8'}[slotLevel]||'5d8';
    const dmgResult=rollDiceNotation(dice,0);
    rollResult={
      name:`Divine Smite (${ordinal(slotLevel)} slot)`,
      atkRoll:null,atkTotal:null,isCrit:false,isMiss:false,
      dmgDice:dice,dmgBonus:0,
      dmgTotal:dmgResult?dmgResult.total:0,
      dmgRolls:dmgResult?dmgResult.rolls:[],
    };
  }
  smiteDialogOpen=false;
  saveAndRender();
}

// ── BATTLE MASTER MANEUVERS ───────────────────────────────────────────────────
function renderManeuversTab(){
  syncAttacks(char);
  const res=char.tracker.resources||{};
  const lvl=char.level;
  const sub=char.tracker.subclass?char.tracker.subclass.id:'';
  if(!(char.class.id==='fighter'&&sub==='battlemaster')){
    return`<div class="card"><p style="color:var(--muted);font-style:italic;">Battle Master maneuvers are only available to Fighter subclass: Battle Master.</p></div>`;
  }
  const maxManeuvers=lvl>=15?9:lvl>=7?5:3;
  const chosen=char.tracker.maneuvers||[];
  const superDie=res.superiorityDie||'d8';
  const superCur=res.superiorityDice??res.superiorityDiceMax??0;
  const superMax=res.superiorityDiceMax||4;

  const saveDC=8+getProfBonus(lvl)+getModNum(char.effectiveAbilities.str||10);

  let html=`<div class="two-col">
    <div>
      <div class="card">
        <div class="card-title">Your Maneuvers (${chosen.length}/${maxManeuvers})</div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;">
          <div style="text-align:center;">
            <div style="font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--red);">${superCur}/${superMax}</div>
            <div style="font-size:10px;color:var(--muted);">SUPERIORITY DICE</div>
          </div>
          <div style="font-size:13px;color:var(--ink-light);">Die: <strong>${superDie}</strong> · Save DC: <strong>${saveDC}</strong> · Short/long rest to restore</div>
        </div>
        ${chosen.length===0?`<p style="font-size:13px;color:var(--muted);font-style:italic;">No maneuvers chosen. Select from the list on the right.</p>`:
          chosen.map(id=>{
            const m=MANEUVERS.find(x=>x.id===id);
            if(!m) return '';
            const typeColor=MANEUVER_TYPE_COLORS[m.type]||'#666';
            return`<div style="border:1px solid var(--border);border-radius:5px;margin-bottom:6px;padding:8px 10px;background:var(--surface);">
              <div style="display:flex;align-items:center;gap:8px;">
                <span style="font-family:'Cinzel',serif;font-size:12px;font-weight:600;color:var(--ink);flex:1;">${m.name}</span>
                <span style="font-size:9px;padding:2px 6px;border-radius:8px;background:${typeColor}22;color:${typeColor};font-family:'Cinzel',serif;letter-spacing:0.3px;">${m.type.toUpperCase()}</span>
                <span style="font-size:11px;color:var(--ac-blue);font-family:'Cinzel',serif;">${m.die}</span>
                <button onclick="toggleManeuver('${id}')" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;">✕</button>
              </div>
              <div style="font-size:12px;color:var(--ink-light);margin-top:4px;line-height:1.5;">${m.desc.replace('SD',superDie)}</div>
            </div>`;
          }).join('')}
      </div>
    </div>
    <div class="card" style="padding:0;overflow:hidden;">
      <div style="padding:8px 12px;background:var(--surface2);border-bottom:1px solid var(--border);font-family:'Cinzel',serif;font-size:12px;color:var(--red);">All PHB Battle Master Maneuvers</div>
      <div style="max-height:500px;overflow-y:auto;">
        ${MANEUVERS.map(m=>{
          const isChosen=chosen.includes(m.id);
          const canAdd=!isChosen&&chosen.length<maxManeuvers;
          const typeColor=MANEUVER_TYPE_COLORS[m.type]||'#666';
          return`<div style="display:flex;align-items:start;gap:8px;padding:8px 10px;border-bottom:1px solid var(--border);background:${isChosen?'#f9e8e8':'var(--surface)'};">
            <div style="flex:1;">
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
                <span style="font-family:'Cinzel',serif;font-size:12px;font-weight:600;color:var(--ink);">${m.name}</span>
                <span style="font-size:9px;padding:1px 5px;border-radius:6px;background:${typeColor}22;color:${typeColor};">${m.type}</span>
                <span style="font-size:10px;color:var(--ac-blue);">${m.die.replace('SD',superDie)}</span>
              </div>
              <div style="font-size:11px;color:var(--ink-light);">${m.desc.replace('SD',superDie)}</div>
            </div>
            <button onclick="toggleManeuver('${m.id}')" style="font-family:'Cinzel',serif;font-size:10px;padding:3px 8px;background:${isChosen?'var(--hp-red)':'var(--surface2)'};color:${isChosen?'#fff':'var(--ink)'};border:1px solid ${isChosen?'var(--hp-red)':'var(--border)'};border-radius:3px;cursor:pointer;white-space:nowrap;flex-shrink:0;"
              ${!isChosen&&!canAdd?'disabled':''}>
              ${isChosen?'✕ Remove':'+ Choose'}
            </button>
          </div>`;
        }).join('')}
      </div>
    </div>
  </div>`;
  return html;
}

// ── COMBAT FEATURES REFERENCE ─────────────────────────────────────────────────
function renderCombatFeatures(){
  const cls=char.class.id;
  const lvl=char.level;
  const sub=char.tracker.subclass?char.tracker.subclass.id:'';
  const eff=char.effectiveAbilities;
  const prof=getProfBonus(lvl);
  const res=char.tracker.resources||{};

  const features=[];

  const feat=(title,lines)=>features.push({title,lines});

  if(cls==='barbarian'){
    feat('Rage',[
      `Uses: ${res.rageUses??'?'}/${res.rageUsesMax??'?'} (long rest)`,
      `Damage bonus: +${res.rageDmg||2} on STR melee/thrown weapon attacks`,
      `Resistance to bludgeoning, piercing, and slashing damage while raging`,
      `Advantage on STR checks and saves while raging`,
      `Can't cast or concentrate on spells while raging`,
      lvl>=2?`Reckless Attack (Lv2): advantage on STR attacks; foes gain advantage vs you until next turn`:'',
      lvl>=7?`Feral Instinct (Lv7): advantage on Initiative; can't be surprised while raging`:'',
    ].filter(Boolean));
  }

  if(cls==='bard'){
    feat('Bardic Inspiration',[
      `${res.bardicDie||'d6'} die, ${res.bardicInspirationMax||getModNum(eff.cha||10)} per ${res.bardicShortRest?'short/long':'long'} rest`,
      'Bonus action: grant die to creature within 60 ft',
      'Recipient can add to attack, ability check, or saving throw within 10 min',
      lvl>=5?'Font of Inspiration (Lv5): regain on short rest':''
    ].filter(Boolean));
    if(lvl>=2) feat('Jack of All Trades (Lv2)',[`Add half proficiency bonus (+${Math.floor(prof/2)}) to ability checks you aren't proficient in`]);
    if(lvl>=3) feat('Expertise (Lv3)',['Double proficiency bonus on two chosen skills']);
    if(lvl>=5) feat('Cutting Words (Lore, Lv3)',['Reaction: subtract bardic die from creature\'s attack/ability/damage roll within 60 ft']);
  }

  if(cls==='cleric'){
    feat('Channel Divinity',[
      `${res.channelDivinity??'?'}/${res.channelDivinityMax||1} uses (short/long rest)`,
      'Turn Undead: 30-ft radius; undead WIS save or flee for 1 min',
      lvl>=2?'Destroy Undead: undead of CR ½ or lower instantly destroyed on failed save':'',
      `Domain feature: varies by domain (${sub||'not chosen'})`
    ].filter(Boolean));
    if(lvl>=10) feat('Divine Intervention (Lv10)',['Implore deity for aid; 1% chance per cleric level; at Lv20 always succeeds']);
  }

  if(cls==='druid'){
    const cr=res.wildShapeCR;
    const crStr=cr>=1?`CR ${cr}`:cr===0.5?'CR ½':'CR ¼';
    feat('Wild Shape',[
      `${res.wildShape??'?'}/2 uses (short/long rest)`,
      `Current limit: ${crStr}${res.wildShapeSwim?', swim':''} ${res.wildShapeFly?', fly':''}`,
      'Transform into beast; use beast\'s stats except INT/WIS/CHA',
      'HP when reverting = original HP - damage taken in beast form',
      res.moonDruid?`Moon Druid: CR ${cr} beasts including elementals at Lv10`:'',
    ].filter(Boolean));
  }

  if(cls==='fighter'){
    feat('Second Wind',[`${res.secondWind??0}/${res.secondWindMax||1} (short/long rest) · Bonus action: regain 1d10+${lvl} HP`]);
    if(lvl>=2) feat('Action Surge',[`${res.actionSurge??0}/${res.actionSurgeMax||1} (short/long rest) · Take one additional action on your turn`]);
    if(lvl>=9) feat('Indomitable',[`${res.indomitable??0}/${res.indomitableMax||1} (long rest) · Reroll a failed saving throw (must use new roll)`]);
    const extraAtk=lvl>=20?3:lvl>=11?2:lvl>=5?1:0;
    if(extraAtk>0) feat(`Extra Attack (Lv5)`,['Attack twice when you take the Attack action (Lv5: 2, Lv11: 3, Lv20: 4)']);
    if(lvl>=11&&sub==='champion') feat('Improved Critical (Champion)',['Score critical hit on 18, 19, or 20']);
  }

  if(cls==='monk'){
    feat('Ki Points',[
      `${res.ki??0}/${res.kiMax||lvl} (short/long rest) · <span data-tip="Ki Save DC — the difficulty for targets to resist your monk abilities like Stunning Strike. DC = 8 + proficiency bonus + WIS modifier.">Ki save DC ${res.kiDC||8}</span>`,
      `Flurry of Blows: ${lvl>=5?Math.ceil(lvl/4):'1'} ki — bonus action: 2 unarmed strikes`,
      'Patient Defense: 1 ki — bonus action: Dodge until start of next turn',
      'Step of the Wind: 1 ki — bonus action: Dash or Disengage; jump distance doubled',
    ]);
    feat('Martial Arts',[
      `Die: ${res.martialDie||'d4'} · Use DEX instead of STR for unarmed/monk weapon attacks`,
      'When you use Attack action with monk weapon: bonus action unarmed strike',
    ]);
    if(lvl>=3) feat('Deflect Missiles (Lv3)','Reaction: reduce ranged weapon damage by 1d10+DEX mod+monk level. If reduced to 0: catch and throw back (+prof attack, 1d6+DEX damage)');
    if(lvl>=4) feat('Slow Fall (Lv4)',['Reaction when falling: reduce fall damage by 5 × monk level']);
    if(lvl>=5) feat('Stunning Strike (Lv5)',['After hitting: spend 1 ki. Target CON save or stunned until end of your next turn']);
  }

  if(cls==='paladin'){
    feat('Lay on Hands',[
      `Pool: ${res.layOnHandsHP??0}/${res.layOnHandsHPMax||lvl*5} HP (long rest)`,
      'Touch a creature to restore HP from pool (1 HP per 1 pool point)',
      '5 pool points: cure one disease or neutralize one poison',
    ]);
    feat('Divine Smite',[
      'After hitting with melee weapon attack: expend spell slot',
      `Slot 1st: 2d8 · 2nd: 3d8 · 3rd: 4d8 · 4th: 5d8 · (max 5d8)`,
      '+1d8 radiant vs undead or fiends',
    ]);
    if(lvl>=2) feat('Fighting Style (Lv2)',['Chosen at Lv2. Common: Defense (+1 AC in armor), Dueling (+2 damage with one-handed weapon), Great Weapon Fighting, Protection']);
    if(lvl>=5) feat('Extra Attack (Lv5)',['Attack twice when you take the Attack action']);
    if(lvl>=6) feat('Aura of Protection (Lv6)',[`All friendly creatures within 10 ft add your CHA modifier (+${getModNum(eff.cha||10)}) to saving throws`]);
  }

  if(cls==='ranger'){
    feat('Favored Enemy',['Advantage on Survival to track and INT to recall info. Learn one enemy language']);
    feat('Natural Explorer',['Choose favored terrain. Double proficiency on INT/WIS checks; can\'t get lost in favored terrain; difficult terrain doesn\'t slow group']);
    if(lvl>=5) feat('Extra Attack (Lv5)',['Attack twice when you take the Attack action']);
    if(lvl>=8) feat("Land's Stride (Lv8)",['Move through nonmagical difficult terrain at no cost; pass through nonmagical plants without damage. Advantage on saves vs magically created plants']);
  }

  if(cls==='rogue'){
    const sneak=res.sneakAttackDice||1;
    feat('Sneak Attack',[
      `${sneak}d6 extra damage once per turn`,
      'Requirements: advantage on the attack roll, OR an ally adjacent to target (not incapacitated)',
      'Can use with finesse or ranged weapons only',
    ]);
    feat('Cunning Action (Lv2)',['Bonus action: Dash, Disengage, or Hide']);
    if(lvl>=5) feat('Uncanny Dodge (Lv5)',['Reaction when visible attacker hits: halve the damage']);
    if(lvl>=7) feat('Evasion (Lv7)',['DEX saving throws against area effects: no damage on success, half on failure']);
    if(lvl>=11) feat('Reliable Talent (Lv11)',['Treat any d20 roll below 10 as a 10 for ability checks you\'re proficient in']);
  }

  if(cls==='sorcerer'){
    feat('Sorcery Points',[
      `${res.sorceryPoints??0}/${res.sorceryPointsMax||lvl} (long rest)`,
      'Flexible Casting: slots→points: 1st=1, 2nd=2, 3rd=3, 4th=4, 5th=5',
      'Points→slots: 1st=2pts, 2nd=3pts, 3rd=5pts, 4th=6pts, 5th=7pts',
    ]);
    feat('Metamagic',['Careful (save allies), Distant (double range), Empowered (reroll damage), Extended (double duration), Heightened (disadv on save), Quickened (bonus action cast), Subtle (no V/S), Twinned (target 2nd creature)']);
  }

  if(cls==='warlock'){
    const beams=char.level>=17?4:char.level>=11?3:char.level>=5?2:1;
    feat('Eldritch Blast',[
      `${beams} beam${beams>1?'s':''} · Ranged spell attack · 1d10 force per beam`,
      'Invocations can add: push 10 ft (Repelling Blast), pull 10 ft (Grasp of Hadar), +CHA damage (Agonizing Blast), slow speed (Lance of Lethargy)',
    ]);
    feat('Pact Magic',[
      `${res.warlockSlots??'?'}/${res.warlockSlotsMax||'?'} ${ordinal(res.warlockSlotLevel||1)}-level slots (short/long rest)`,
      'All slots are the same level; always cast at highest available slot level',
    ]);
    if(lvl>=3) feat('Pact Boon',[
      char.tracker.pactBoon||'Not yet chosen',
      char.tracker.pactBoon==='Pact of the Blade'?'Summon pact weapon (can be any weapon type, counts as magical, bonded to you)':'',
      char.tracker.pactBoon==='Pact of the Chain'?'Find Familiar gains special form options; can forgo attacks to let familiar use reaction to attack':'',
      char.tracker.pactBoon==='Pact of the Tome'?'Book of Shadows: 3 cantrips from any spell list; ritual spells added to it can be cast as rituals':'',
    ].filter(Boolean));
  }

  if(cls==='wizard'){
    feat('Arcane Recovery',[
      `1/day (on short rest): recover spell slots totaling up to ${Math.ceil(lvl/2)} levels`,
      'Each slot recovered must be 5th level or lower',
    ]);
    feat('Spellbook',['Learn 2 new spells per level (any wizard spells you find can also be copied). Starting spells: 6 + INT mod']);
  }

  if(features.length===0){
    return`<div class="card"><p style="color:var(--muted);font-style:italic;">No combat features found for this class.</p></div>`;
  }

  return`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;">
    ${features.map(f=>`<div class="card">
      <div class="card-title">${f.title}</div>
      ${(Array.isArray(f.lines)?f.lines:[f.lines]).map(l=>`<p style="font-size:13px;color:var(--ink-light);margin-bottom:5px;line-height:1.5;">• ${l}</p>`).join('')}
    </div>`).join('')}
  </div>`;
}

// ── ATTACK MANAGEMENT ─────────────────────────────────────────────────────────
function saveCustomAtk(){
  if(!atkForm.name) return;
  syncAttacks(char);
  const eff=char.effectiveAbilities;
  const prof=getProfBonus(char.level);
  const mod=getModNum(eff[atkForm.abilityKey]||10);
  char.tracker.attacks.push({
    id:'custom_'+Date.now(),
    name:atkForm.name,
    auto:false,
    atkBonus:mod+(atkForm.proficient?prof:0),
    dmgDice:atkForm.dmgDice||'1d6',
    dmgBonus:mod,
    dmgType:atkForm.dmgType||'',
    range:atkForm.range||'5 ft',
    notes:atkForm.notes||'',
  });
  atkForm={name:'',type:'melee',abilityKey:'str',proficient:true,dmgDice:'1d8',dmgType:'slashing',notes:'',range:''};
  showAddAtk=false;
  saveAndRender();
}

function deleteCustomAtk(id){
  syncAttacks(char);
  char.tracker.attacks=char.tracker.attacks.filter(a=>a.id!==id);
  saveAndRender();
}

function toggleManeuver(id){
  syncAttacks(char);
  const lvl=char.level;
  const max=lvl>=15?9:lvl>=7?5:3;
  const idx=char.tracker.maneuvers.indexOf(id);
  if(idx>-1) char.tracker.maneuvers.splice(idx,1);
  else if(char.tracker.maneuvers.length<max) char.tracker.maneuvers.push(id);
  saveAndRender();
}



// ── SKILLS TAB ──
function getExpertiseLevels(classId){
  // Returns which levels grant expertise slots and how many
  if(classId==='rogue') return {1:2, 6:2};
  if(classId==='bard')  return {3:2, 10:2};
  return {};
}
function expertiseSlotsAvailable(){
  const classId=char.class.id;
  const lvlMap=getExpertiseLevels(classId);
  let total=0;
  Object.entries(lvlMap).forEach(([lvl,n])=>{if(char.level>=parseInt(lvl))total+=n;});
  return total;
}
function toggleExpertise(skillName){
  const ex=char.tracker.expertiseSkills;
  const idx=ex.indexOf(skillName);
  const slots=expertiseSlotsAvailable();
  if(idx>-1){ex.splice(idx,1);}
  else if(ex.length<slots){ex.push(skillName);}
  saveAndRender();
}

function renderSkills(){
  const eff=char.effectiveAbilities;
  const prof=getProfBonus(char.level);
  const ex=char.tracker.expertiseSkills||[];
  const slots=expertiseSlotsAvailable();
  const classId=char.class.id;
  const hasExpertise=slots>0;
  const used=ex.length;

  return`<div class="card">
    <div class="card-title">Skills</div>
    ${hasExpertise?`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:13px;color:var(--ink-light);">
      <strong style="color:var(--ink);">Expertise</strong> — Double proficiency bonus on selected skills.
      ${slots>0?`<span style="float:right;font-family:'Cinzel',serif;font-size:12px;color:${used>=slots?'var(--green)':'var(--red)'};">${used}/${slots} slots used</span>`:''}
      <br><span style="font-size:11px;color:var(--muted);">Click ★ next to any proficient skill to grant expertise. Only proficient skills are eligible.</span>
    </div>`:''}
    <div class="skill-list">
      ${SKILLS_LIST.map(sk=>{
        const isProf=char.skillProficiencies.includes(sk.name);
        const isExpert=ex.includes(sk.name);
        const effectiveBonus=isProf?(isExpert?prof*2:prof):0;
        const mod=getModNum(eff[sk.stat])+effectiveBonus;
        const modStr=(mod>=0?'+':'')+mod;
        const canToggle=hasExpertise&&isProf&&(isExpert||(used<slots));
        return`<div class="skill-item ${isProf?'prof':'not-prof'}" data-tip="${SKILL_TIPS_TRACKER[sk.name]||sk.name}" style="position:relative;">
          <span style="display:flex;align-items:center;gap:5px;">
            ${hasExpertise&&isProf?`<button onclick="toggleExpertise('${sk.name}')" title="${isExpert?'Remove expertise':'Grant expertise'}"
              style="background:none;border:none;cursor:${canToggle?'pointer':'not-allowed'};font-size:13px;opacity:${canToggle?1:0.3};padding:0;line-height:1;color:${isExpert?'var(--gold)':'var(--muted)'};">★</button>`:
              `<span style="font-size:13px;color:${isProf?'var(--ink-light)':'var(--muted)'};">${isProf?'●':'○'}</span>`}
            ${sk.name}
            <span style="font-size:11px;color:var(--muted);font-style:italic;">(${STAT_LABELS[sk.stat]})</span>
            ${isExpert?`<span style="font-size:10px;background:var(--surface2);border:1px solid var(--gold);border-radius:8px;padding:1px 6px;color:var(--gold);font-family:'Cinzel',serif;">2×</span>`:''}
          </span>
          <span class="skill-val" style="${isExpert?'color:var(--gold);':''}">${modStr}</span>
        </div>`;}).join('')}
    </div>
  </div>`;
}

// ── LEVEL UP TAB ──
function renderLevelUp(){
  const nextLevel=char.level+1;
  const canLevel=char.level<20;
  const lu=levelUpState;
  const classId=char.class.id;
  const features=(CLASS_FEATURES[classId]||{})[nextLevel]||[];
  const isASILevel=(ASI_LEVELS[classId]||[]).includes(nextLevel);
  const isSubclassLevel=nextLevel===SUBCLASS_LEVEL[classId];
  const needsSubclass=isSubclassLevel&&!char.tracker.subclass;
  const subclasses=SUBCLASSES[classId]||[];
  const eff=char.effectiveAbilities;

  // Expertise: Rogue Lv1+6, Bard Lv3+10
  const expertiseLvlMap=getExpertiseLevels(classId);
  const newExpertiseSlots=expertiseLvlMap[nextLevel]||0;
  const needsExpertise=newExpertiseSlots>0;
  // expertise choices for this level-up only
  if(!levelUpState.expertisePicks)levelUpState.expertisePicks=[];

  if(!canLevel)return`<div class="card" style="text-align:center;padding:2rem;">
    <div style="font-family:'Cinzel',serif;font-size:18px;color:var(--gold);margin-bottom:8px;">Level 20 Reached</div>
    <p style="color:var(--muted);font-style:italic;">Your character has reached the maximum level. Truly legendary.</p>
  </div>`;

  return`
    ${renderPostLevelUpBanner()}
    ${!lu.active?`<div class="level-up-banner">
      <h2>Ready to Level Up?</h2>
      <p>${char.identity.name} is currently Level ${char.level} — advance to Level ${nextLevel}</p>
      <div style="margin-top:12px;"><button class="btn btn-red" onclick="startLevelUp()">Level Up to ${nextLevel} →</button></div>
    </div>`:
    `<div class="level-up-banner" style="border-color:var(--red);">
      <h2>Leveling Up to ${nextLevel}</h2>
      <p>Complete the choices below, then confirm.</p>
    </div>`}

    <div class="two-col">
      <div>
        <div class="card">
          <div class="card-title">Features at Level ${nextLevel}</div>
          ${features.length?`<div class="feature-list">
            ${features.map(f=>`<div class="feature-item">• ${f}</div>`).join('')}
          </div>`:`<p style="font-size:13px;color:var(--muted);font-style:italic;">No new class features at this level.</p>`}
        </div>

        <div class="card">
          <div class="card-title">Hit Points</div>
          <p style="font-size:13px;color:var(--ink-light);margin-bottom:8px;">
            Roll a d${char.class.hitDie} or take the average (${Math.ceil(char.class.hitDie/2)+1}) + CON modifier (${getMod(eff.con)}).
          </p>
          ${lu.active?`<div style="display:flex;gap:6px;align-items:center;">
            <label style="margin:0;white-space:nowrap;">HP gained:</label>
            <input type="number" id="hp-gain" min="1" max="${char.class.hitDie+getModNum(eff.con)+5}" value="${Math.ceil(char.class.hitDie/2)+1+getModNum(eff.con)}" style="width:70px;text-align:center;"/>
          </div>`:''}
        </div>
      </div>

      <div>
        ${isASILevel&&lu.active?`<div class="card">
          <div class="card-title">ASI or Feat</div>
          <div style="display:flex;gap:8px;margin-bottom:10px;">
            <button class="btn ${lu.useAsi?'btn-red':'btn-ghost'} btn-sm" onclick="setASIMode(true)">+2 / +1+1 Ability Score</button>
            <button class="btn ${!lu.useAsi?'btn-red':'btn-ghost'} btn-sm" onclick="setASIMode(false)">Choose a Feat</button>
          </div>
          ${lu.useAsi?`
            <p style="font-size:12px;color:var(--muted);margin-bottom:6px;">Click a stat once for <strong>+1</strong>, click it again for <strong>+2</strong>. Or pick two different stats for +1 each.</p>
            <div class="asi-pick">
              ${STAT_NAMES.map(s=>{
                const count=lu.asiChoice.filter(x=>x===s).length;
                const total=lu.asiChoice.length;
                // Disable if: total is 2 AND this stat has 0 picks (can't add more)
                const disabled=total>=2&&count===0;
                return`<button class="asi-btn${count>0?' selected':''}" onclick="toggleASI('${s}')"
                  ${disabled?' disabled':''}>${STAT_LABELS[s]}${count>0?` +${count}`:''}
                  <span style="font-size:10px;opacity:0.7;">(${eff[s]})</span></button>`;}).join('')}
            </div>`:`
            <p style="font-size:12px;color:var(--muted);margin-bottom:6px;">Choose one feat:</p>
            <div class="feat-scroll">
              ${PHB_FEATS.filter(f=>!char.feats.find(cf=>cf.id===f.id)&&!(char.tracker.featChoices||[]).find(cf=>cf.id===f.id)).map(f=>`
                <div class="feat-opt${lu.featChoice===f.id?' selected':''}" onclick="selectFeat('${f.id}')">
                  <div class="feat-opt-name">${f.name}</div>
                  <div class="feat-opt-desc">${f.desc}</div>
                </div>`).join('')}
            </div>`}
        </div>`:''}

        ${needsExpertise&&lu.active?`<div class="card">
          <div class="card-title">Expertise — Choose ${newExpertiseSlots} Skills</div>
          <p style="font-size:12px;color:var(--muted);margin-bottom:8px;">Select ${newExpertiseSlots} proficient skill${newExpertiseSlots>1?'s':''} to gain Expertise (double proficiency bonus). Only skills you're already proficient in are eligible.</p>
          <div style="display:flex;flex-direction:column;gap:4px;max-height:260px;overflow-y:auto;">
            ${SKILLS_LIST.filter(sk=>char.skillProficiencies.includes(sk.name)&&!(char.tracker.expertiseSkills||[]).includes(sk.name)).map(sk=>{
              const picked=lu.expertisePicks.includes(sk.name);
              const full=lu.expertisePicks.length>=newExpertiseSlots;
              return`<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:4px;background:${picked?'#f9e8e8':'var(--surface2)'};border:1px solid ${picked?'var(--red)':'var(--border)'};cursor:${!picked&&full?'not-allowed':'pointer'};opacity:${!picked&&full?0.4:1};"
                onclick="${!picked&&full?'':`toggleExpertisePick('${sk.name}')`}">
                <span style="font-size:13px;color:${picked?'var(--red)':'var(--muted)'};">${picked?'★':'☆'}</span>
                <span style="font-size:13px;flex:1;">${sk.name}</span>
                <span style="font-size:11px;color:var(--muted);font-style:italic;">${STAT_LABELS[sk.stat]}</span>
              </div>`;}).join('')}
          </div>
          <p style="font-size:12px;color:var(--muted);margin-top:6px;">${lu.expertisePicks.length}/${newExpertiseSlots} selected: ${lu.expertisePicks.length?lu.expertisePicks.join(', '):'none'}</p>
        </div>`:''}

        ${needsSubclass&&lu.active?`<div class="card">
          <div class="card-title">Choose Your Subclass</div>
          <div class="subclass-grid">
            ${subclasses.map(sc=>`
              <div class="sc-card${lu.subclassChoice===sc.id?' selected':''}" onclick="selectSubclass('${sc.id}')">
                <div class="sc-card-name">${sc.name}</div>
                <div class="sc-card-desc">${sc.desc}</div>
              </div>`).join('')}
          </div>
        </div>`:''}

        ${renderLevelUpSpellSection(classId,char.tracker.subclass?char.tracker.subclass.id:'',nextLevel)}
        ${lu.active?`<div style="display:flex;gap:8px;margin-top:4px;">
          <button class="btn btn-red" onclick="confirmLevelUp()" ${!canConfirmLevelUp()?'disabled':''}>Confirm Level Up</button>
          <button class="btn btn-ghost" onclick="cancelLevelUp()">Cancel</button>
        </div>`:''} 
      </div>
    </div>

    <!-- Level history -->
    ${char.tracker.asiChoices&&char.tracker.asiChoices.length?`<div class="card" style="margin-top:1rem;">
      <div class="card-title">Past Level Choices</div>
      ${char.tracker.asiChoices.map(c=>`<div class="feature-item">Lv.${c.atLevel}: ${c.type==='feat'?`Feat — ${c.feat}`:`+${c.increases.map(([s,n])=>`${n} ${STAT_LABELS[s]}`).join(', ')}`}</div>`).join('')}
    </div>`:''}
  `;
}

function canConfirmLevelUp(){
  const nextLevel=char.level+1;
  const classId=char.class.id;
  const isASI=(ASI_LEVELS[classId]||[]).includes(nextLevel);
  const needsSub=nextLevel===SUBCLASS_LEVEL[classId]&&!char.tracker.subclass;
  const newExpertiseSlots=(getExpertiseLevels(classId)[nextLevel]||0);
  const lu=levelUpState;
  if(isASI){
    if(lu.useAsi&&lu.asiChoice.length!==2)return false;
    if(!lu.useAsi&&!lu.featChoice)return false;
  }
  if(needsSub&&!lu.subclassChoice)return false;
  // Must pick the exact number of expertise skills available at this level
  const eligibleCount=SKILLS_LIST.filter(sk=>char.skillProficiencies.includes(sk.name)&&!(char.tracker.expertiseSkills||[]).includes(sk.name)).length;
  if(newExpertiseSlots>0&&lu.expertisePicks.length!==Math.min(newExpertiseSlots,eligibleCount))return false;
  return true;
}

const ENC_CONDITIONS=['Blinded','Charmed','Deafened','Frightened','Grappled','Incapacitated','Invisible','Paralyzed','Petrified','Poisoned','Prone','Restrained','Stunned','Unconscious'];

function getEncounterSorted(){
  return [...encounter.combatants].sort((a,b)=>b.initiative-a.initiative||(a.isPlayer?-1:b.isPlayer?1:0));
}

function encounterAddPlayer(){
  if(!char) return;
  if(encounter.combatants.find(c=>c.isPlayer)) return;
  const dexMod=Math.floor(((char.effectiveAbilities.dex||10)-10)/2);
  const initRoll=Math.floor(Math.random()*20)+1+dexMod;
  encounter.combatants.push({
    id:'__player__',
    name:char.identity.name||'Player',
    isPlayer:true,
    initiative:initRoll,
    hp:char.tracker.currentHP,
    maxHP:computeMaxHP(),
    ac:char.ac||10,
    conditions:[...(Array.isArray(char.tracker.conditions)?char.tracker.conditions.map(c=>typeof c==='string'?c:(c.name||String(c))):[])],
    defeated:char.tracker.currentHP<=0,
  });
  render();
}

function encounterAddEnemy(){
  const name=(document.getElementById('enc-f-name')||{}).value||'';
  const maxHP=parseInt((document.getElementById('enc-f-hp')||{}).value)||1;
  const ac=parseInt((document.getElementById('enc-f-ac')||{}).value)||10;
  const init=parseInt((document.getElementById('enc-f-init')||{}).value)||0;
  if(!name.trim()){alert('Enter a name for the combatant.');return;}
  encounter.combatants.push({
    id:'enemy_'+Date.now()+'_'+Math.floor(Math.random()*1000),
    name:name.trim(),
    isPlayer:false,
    initiative:init,
    hp:maxHP,maxHP,
    ac,
    conditions:[],
    defeated:false,
  });
  // Clear form
  ['enc-f-name','enc-f-hp','enc-f-ac','enc-f-init'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  render();
}

function encounterRollEnemyInit(){
  const el=document.getElementById('enc-f-init');
  if(el) el.value=Math.floor(Math.random()*20)+1;
}

function encounterRemove(id){
  encounter.combatants=encounter.combatants.filter(c=>c.id!==id);
  encounterCondExpanded.delete(id);
  if(encounter.activeCombatantId===id){
    const sorted=getEncounterSorted();
    const alive=sorted.filter(c=>!c.defeated);
    encounter.activeCombatantId=alive.length?alive[0].id:null;
  }
  render();
}

function encounterStart(){
  if(!encounter.combatants.length) return;
  encounter.active=true;
  encounter.round=1;
  const sorted=getEncounterSorted();
  const first=sorted.find(c=>!c.defeated)||sorted[0];
  encounter.activeCombatantId=first?first.id:null;
  render();
}

function encounterEnd(){
  encounter.active=false;
  encounter.activeCombatantId=null;
  render();
}

function encounterReset(){
  encounter={active:false,round:1,activeCombatantId:null,combatants:[]};
  encounterCondExpanded.clear();
  render();
}

function encounterNextTurn(){
  if(!encounter.active) return;
  const sorted=getEncounterSorted();
  if(!sorted.length) return;
  const alive=sorted.filter(c=>!c.defeated);
  if(!alive.length){encounter.active=false;render();return;}
  const curIdx=sorted.findIndex(c=>c.id===encounter.activeCombatantId);
  let next=curIdx+1;
  let steps=0;
  let wrapped=false;
  while(steps<sorted.length){
    if(next>=sorted.length){next=0;wrapped=true;}
    if(!sorted[next].defeated) break;
    next++;steps++;
  }
  if(wrapped) encounter.round++;
  encounter.activeCombatantId=sorted[next].id;
  render();
}

function encounterSetInit(id,val){
  const c=encounter.combatants.find(c=>c.id===id);
  if(c) c.initiative=parseInt(val)||0;
  // Don't re-render — just update the value in place to avoid focus loss
}

function encounterDamage(id){
  const amt=parseInt((document.getElementById('enc-delta-'+id)||{}).value)||0;
  if(!amt) return;
  const c=encounter.combatants.find(c=>c.id===id);
  if(!c) return;
  c.hp=Math.max(0,c.hp-amt);
  if(c.hp===0&&!c.conditions.includes('Unconscious')) c.conditions.push('Unconscious');
  if(c.isPlayer){char.tracker.currentHP=c.hp;save();}
  render();
}

function encounterHeal(id){
  const amt=parseInt((document.getElementById('enc-delta-'+id)||{}).value)||0;
  if(!amt) return;
  const c=encounter.combatants.find(c=>c.id===id);
  if(!c) return;
  c.hp=Math.min(c.maxHP,c.hp+amt);
  c.conditions=c.conditions.filter(cd=>cd!=='Unconscious');
  c.defeated=false;
  if(c.isPlayer){char.tracker.currentHP=c.hp;save();}
  render();
}

function encounterToggleCondition(id,cond){
  const c=encounter.combatants.find(c=>c.id===id);
  if(!c) return;
  const idx=c.conditions.indexOf(cond);
  if(idx>=0) c.conditions.splice(idx,1);
  else c.conditions.push(cond);
  render();
}

function encounterToggleDefeated(id){
  const c=encounter.combatants.find(c=>c.id===id);
  if(!c) return;
  c.defeated=!c.defeated;
  if(!c.defeated&&c.hp===0) c.hp=1;
  render();
}

function encounterToggleCondPanel(id){
  if(encounterCondExpanded.has(id)) encounterCondExpanded.delete(id);
  else encounterCondExpanded.add(id);
  render();
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────

function computeMaxHP(){
  const eff=char.effectiveAbilities;
  const conMod=getModNum(eff.con);
  const toughBonus=char.feats.find(f=>f.id==='tough')||(char.tracker.featChoices||[]).find(f=>f.id==='tough')?char.level*2:0;
  // Hill Dwarf: Dwarven Toughness grants +1 HP per level
  const hillDwarfBonus=(char.race&&char.race.subraceId==='dwarf_hill')?char.level:0;
  let hp=char.class.hitDie+conMod; // level 1
  // subsequent levels use stored HP gains
  const gains=char.tracker.hpGains||[];
  gains.forEach(g=>hp+=g);
  return hp+toughBonus+hillDwarfBonus;
}

function adjustHP(dir){
  const el=document.getElementById('hp-delta');
  const amt=parseInt(el?el.value:0)||0;
  if(amt<=0)return;
  const t=char.tracker;
  const max=computeMaxHP();
  if(dir>0){
    // healing: first fill temp, then main
    t.currentHP=Math.min(max,t.currentHP+amt);
  } else {
    // damage: absorb temp HP first
    let dmg=amt;
    if(t.tempHP>0){const absorbed=Math.min(t.tempHP,dmg);t.tempHP-=absorbed;dmg-=absorbed;}
    t.currentHP=Math.max(0,t.currentHP-dmg);
  }
  if(el)el.value='';
  saveAndRender();
}

function adjustTempHP(){
  const el=document.getElementById('hp-delta');
  const amt=parseInt(el?el.value:0)||0;
  if(amt<=0)return;
  char.tracker.tempHP=Math.max(char.tracker.tempHP,amt);
  if(el)el.value='';
  saveAndRender();
}

function toggleDS(type,idx){
  const ds=char.tracker.deathSaves;
  const cur=type==='success'?ds.successes:ds.failures;
  if(type==='success')ds.successes=cur===idx+1?idx:idx+1;
  else ds.failures=cur===idx+1?idx:idx+1;
  saveAndRender();
}

function addCondition(){
  const sel=document.getElementById('cond-select');
  const val=sel?sel.value:'';
  if(!val)return;
  if(!char.tracker.conditions.includes(val))char.tracker.conditions.push(val);

function removeCondition(c){
  char.tracker.conditions=char.tracker.conditions.filter(x=>x!==c);

function setExhaustion(lvl){
  char.tracker.exhaustion=char.tracker.exhaustion===lvl?lvl-1:lvl;

// Level up actions
function startLevelUp(){
  levelUpState={active:true,asiChoice:[],featChoice:null,useAsi:true,subclassChoice:null,expertisePicks:[]};
  render();
}
function cancelLevelUp(){levelUpState.active=false;render();}

// Fix bug 3: switching modes no longer wipes the other mode's selection
function setASIMode(v){levelUpState.useAsi=v;render();}

// Fix bug 1 & 2: treat asiChoice as a simple array of up to 2 entries.
// Clicking a stat that already has 2 entries (i.e. +2 to same stat) removes one.
// Clicking a stat with 1 entry of that stat when total is already 2 does nothing (already full).
// Clicking an unselected stat when total < 2 adds it.
// Clicking a selected stat (count=1, total=1) adds it again for +2.
function toggleASI(stat){
  const arr=levelUpState.asiChoice;
  const countForStat=arr.filter(x=>x===stat).length;
  const total=arr.length;

  if(countForStat===2){
    // Remove one instance (de-select one +1)
    const i=arr.lastIndexOf(stat);
    arr.splice(i,1);
  } else if(countForStat===1&&total===2){
    // Already at 2 total with a different second stat — remove this one
    const i=arr.indexOf(stat);
    arr.splice(i,1);
  } else if(countForStat===1&&total===1){
    // Only one entry so far, same stat — add again for +2
    arr.push(stat);
  } else if(countForStat===0&&total<2){
    arr.push(stat);
  }
  render();
}

function selectFeat(id){levelUpState.featChoice=id;render();}
function selectSubclass(id){levelUpState.subclassChoice=id;render();}
function toggleExpertisePick(skill){
  const picks=levelUpState.expertisePicks;
  const nextLevel=char.level+1;
  const classId=char.class.id;
  const slots=(getExpertiseLevels(classId)[nextLevel]||0);
  const idx=picks.indexOf(skill);
  if(idx>-1){picks.splice(idx,1);}
  else if(picks.length<slots){picks.push(skill);}
  render();
}

function confirmLevelUp(){
  if(!canConfirmLevelUp())return;
  const nextLevel=char.level+1;
  const classId=char.class.id;
  const lu=levelUpState;
  const isASI=(ASI_LEVELS[classId]||[]).includes(nextLevel);
  const needsSub=nextLevel===SUBCLASS_LEVEL[classId]&&!char.tracker.subclass;

  // HP gain
  const hpEl=document.getElementById('hp-gain');
  const hpGain=parseInt(hpEl?hpEl.value:0)||0;
  if(!char.tracker.hpGains)char.tracker.hpGains=[];
  char.tracker.hpGains.push(hpGain);
  char.tracker.currentHP+=hpGain;

  // Subclass
  if(needsSub&&lu.subclassChoice){
    const subclasses=SUBCLASSES[classId]||[];
    char.tracker.subclass=subclasses.find(s=>s.id===lu.subclassChoice)||null;
  }

  // ASI or Feat
  if(isASI){
    if(!char.tracker.asiChoices)char.tracker.asiChoices=[];
    if(lu.useAsi&&lu.asiChoice.length>0){
      // Apply to effectiveAbilities
      const increases=[];
      const counts={};
      lu.asiChoice.forEach(s=>{counts[s]=(counts[s]||0)+1;});
      Object.entries(counts).forEach(([s,n])=>{
        char.effectiveAbilities[s]=(char.effectiveAbilities[s]||10)+n;
        char.baseAbilities[s]=(char.baseAbilities[s]||10)+n;
        increases.push([s,n]);
      });
      char.tracker.asiChoices.push({atLevel:nextLevel,type:'asi',increases});
    } else if(!lu.useAsi&&lu.featChoice){
      const feat=PHB_FEATS.find(f=>f.id===lu.featChoice);
      if(feat){
        if(!char.tracker.featChoices)char.tracker.featChoices=[];
        char.tracker.featChoices.push(feat);
        char.tracker.asiChoices.push({atLevel:nextLevel,type:'feat',feat:feat.name});
      }
    }
  }

  // Class features
  const features=(CLASS_FEATURES[classId]||{})[nextLevel]||[];
  const newFeatures=features.filter(f=>f!=='ASI or Feat'&&!f.startsWith('Subclass'));
  if(!char.tracker.classFeatures)char.tracker.classFeatures=[];
  char.tracker.classFeatures.push(...newFeatures);

  // Expertise
  const newExpertiseSlots=(getExpertiseLevels(classId)[nextLevel]||0);
  if(newExpertiseSlots>0&&lu.expertisePicks&&lu.expertisePicks.length>0){
    if(!char.tracker.expertiseSkills)char.tracker.expertiseSkills=[];
    lu.expertisePicks.forEach(sk=>{
      if(!char.tracker.expertiseSkills.includes(sk))char.tracker.expertiseSkills.push(sk);
    });
  }

  // Advance level
  char.level=nextLevel;
  char.proficiencyBonus=getProfBonus(nextLevel);
  syncResources(char);
  levelUpState.active=false;
  saveAndRender();
}


// ─── PART 4: LEVEL-UP INTEGRATION WITH RESOURCES / SPELLS / ATTACKS ──────────

// Compute what spell/cantrip gains occur at a given level for a given class
function computeSpellGains(classId, subId, fromLevel, toLevel){
  const gains={
    newSpellSlotLevel: null,   // new slot tier unlocked (e.g. 3 = 3rd level slots)
    newCantrips: 0,            // number of new cantrips to pick
    newSpells: 0,              // number of new spells to pick (known-spell classes)
    wizardFreeSpells: 0,       // wizard gets 2 free spells per level
    preparedCountChange: 0,    // change in prepared cap (for prepared casters)
    newAlwaysPrepared: [],     // domain/oath spells newly unlocked
  };

  const abilityKey = {cleric:'wis',druid:'wis',paladin:'cha',wizard:'int'}[classId]||null;
  const eff = char.effectiveAbilities;
  const mod = abilityKey ? getModNum(eff[abilityKey]||10) : 0;

  // Cantrip gains — check tables
  const cantripKey = subId==='eldritch_knight'?'ek':subId==='arcane_trickster'?'at':classId;
  const cantripTable = CANTRIPS_KNOWN[cantripKey]||[];
  const oldCantrips = cantripTable[fromLevel-1]||0;
  const newCantrips = cantripTable[toLevel-1]||0;
  gains.newCantrips = Math.max(0, newCantrips - oldCantrips);

  // Known spell gains (Bard/Sorcerer/Warlock/Ranger/EK/AT)
  const knownKey = subId==='eldritch_knight'?'ek':subId==='arcane_trickster'?'at':classId;
  const knownTable = SPELLS_KNOWN[knownKey]||[];
  if(knownTable.length){
    const oldKnown = knownTable[fromLevel-1]||0;
    const newKnown = knownTable[toLevel-1]||0;
    gains.newSpells = Math.max(0, newKnown - oldKnown);
  }

  // Wizard: 2 free spells per level gained
  if(classId==='wizard') gains.wizardFreeSpells = 2;

  // New spell slot tier unlocked (full casters)
  const castType = getSpellcastingType(classId, subId);
  if(castType!=='none'&&castType!=='warlock'){
    const oldMax = maxSpellLevel(classId, fromLevel);
    const newMax = maxSpellLevel(classId, toLevel);
    if(newMax > oldMax) gains.newSpellSlotLevel = newMax;
  }

  // Prepared count change (Cleric/Druid/Paladin/Wizard)
  if(['cleric','druid','paladin','wizard'].includes(classId)){
    const oldPrepMax = Math.max(1, (classId==='paladin'
      ? Math.floor(fromLevel/2)+mod
      : fromLevel+mod));
    const newPrepMax = Math.max(1, (classId==='paladin'
      ? Math.floor(toLevel/2)+mod
      : toLevel+mod));
    gains.preparedCountChange = newPrepMax - oldPrepMax;
  }

  // New always-prepared domain/oath spells
  const oldAlways = getAlwaysPreparedAtLevel(classId, subId, fromLevel);
  const newAlways = getAlwaysPreparedAtLevel(classId, subId, toLevel);
  gains.newAlwaysPrepared = newAlways.filter(s=>!oldAlways.includes(s));

  return gains;
}

function getAlwaysPreparedAtLevel(classId, subId, level){
  const spells=[];
  if(classId==='cleric'&&DOMAIN_SPELLS[subId]){
    DOMAIN_SPELLS[subId].forEach((pair,i)=>{if(level>=(i+1)*2-1)pair.forEach(s=>spells.push(s));});
  }
  if(classId==='paladin'&&OATH_SPELLS[subId]){
    OATH_SPELLS[subId].forEach((pair,i)=>{if(level>=(i+1)*2-1)pair.forEach(s=>spells.push(s));});
  }
  return[...new Set(spells)];
}

// Compute what attack/combat gains occur at a given level
function computeAttackGains(classId, subId, fromLevel, toLevel){
  const gains={notes:[]};
  const cls=classId;
  const sub=subId;

  // Extra Attack milestones
  const extraAtkClasses=['barbarian','fighter','monk','paladin','ranger'];
  if(extraAtkClasses.includes(cls)){
    if(fromLevel<5&&toLevel>=5) gains.notes.push('🗡 Extra Attack unlocked — attack twice when you take the Attack action');
    if(cls==='fighter'&&fromLevel<11&&toLevel>=11) gains.notes.push('🗡 Extra Attack (2) — attack 3× with Attack action');
    if(cls==='fighter'&&fromLevel<20&&toLevel>=20) gains.notes.push('🗡 Extra Attack (3) — attack 4× with Attack action');
  }

  // Martial Arts die increases (Monk)
  if(cls==='monk'){
    const oldDie=fromLevel>=17?'d10':fromLevel>=11?'d8':fromLevel>=5?'d6':'d4';
    const newDie=toLevel>=17?'d10':toLevel>=11?'d8':toLevel>=5?'d6':'d4';
    if(oldDie!==newDie) gains.notes.push(`👊 Martial Arts die increased: ${oldDie} → ${newDie}`);
  }

  // Sneak Attack (Rogue) — every level
  if(cls==='rogue'){
    const oldDice=Math.ceil(fromLevel/2);
    const newDice=Math.ceil(toLevel/2);
    if(newDice>oldDice) gains.notes.push(`🗡 Sneak Attack increased: ${oldDice}d6 → ${newDice}d6`);
  }

  // Eldritch Blast beams (Warlock)
  if(cls==='warlock'){
    const oldBeams=fromLevel>=17?4:fromLevel>=11?3:fromLevel>=5?2:1;
    const newBeams=toLevel>=17?4:toLevel>=11?3:toLevel>=5?2:1;
    if(newBeams>oldBeams) gains.notes.push(`🔮 Eldritch Blast gains a beam (${oldBeams} → ${newBeams})`);
  }

  // Rage damage (Barbarian)
  if(cls==='barbarian'){
    const oldRage=fromLevel>=16?4:fromLevel>=9?3:2;
    const newRage=toLevel>=16?4:toLevel>=9?3:2;
    if(newRage>oldRage) gains.notes.push(`⚔️ Rage damage bonus increased: +${oldRage} → +${newRage}`);
  }

  // Bardic Inspiration die
  if(cls==='bard'){
    const oldDie=fromLevel>=15?'d12':fromLevel>=10?'d10':fromLevel>=5?'d8':'d6';
    const newDie=toLevel>=15?'d12':toLevel>=10?'d10':toLevel>=5?'d8':'d6';
    if(oldDie!==newDie) gains.notes.push(`🎵 Bardic Inspiration die: ${oldDie} → ${newDie}`);
  }

  // Battle Master superiority die
  if(cls==='fighter'&&sub==='battlemaster'){
    const oldSD=fromLevel>=15?'d12':fromLevel>=10?'d10':'d8';
    const newSD=toLevel>=15?'d12':toLevel>=10?'d10':'d8';
    if(oldSD!==newSD) gains.notes.push(`🎲 Superiority Die: ${oldSD} → ${newSD}`);
    const oldM=fromLevel>=15?9:fromLevel>=7?5:3;
    const newM=toLevel>=15?9:toLevel>=7?5:3;
    if(newM>oldM) gains.notes.push(`🎲 Maneuver slots: ${oldM} → ${newM} (pick new maneuvers in Attacks tab)`);
  }

  // Cantrip damage scaling tiers (PHB: levels 5, 11, 17)
  if([5,11,17].includes(toLevel)){
    gains.notes.push(`✨ Cantrip damage scales up at Level ${toLevel} (tier change)`);
  }

  return gains;
}

// Post-level-up summary: build the full picture of what changed
function buildLevelUpSummary(fromLevel, toLevel, classId, subId){
  const spellGains = computeSpellGains(classId, subId, fromLevel, toLevel);
  const atkGains   = computeAttackGains(classId, subId, fromLevel, toLevel);
  return {spellGains, atkGains};
}

// ── SPELL SELECTION PROMPTS IN LEVEL-UP FLOW ──────────────────────────────────
// We extend renderLevelUp's right column to show spell picking inline

function renderLevelUpSpellSection(classId, subId, nextLevel){
  const lu=levelUpState;
  if(!lu.spellPicks) lu.spellPicks={cantrips:[],spells:[]};

  const spellGains = computeSpellGains(classId, subId, nextLevel-1, nextLevel);
  const mode = getSpellMode(char);
  const eff=char.effectiveAbilities;
  const maxSL=maxSpellLevel(classId,nextLevel);

  // Build accessible spells for picking
  const existing=new Set([
    ...(char.tracker.spells?.cantrips||[]),
    ...(char.tracker.spells?.spellbook||[]),
    ...(char.tracker.spells?.known||[]),
    ...(lu.spellPicks?.spells||[]),
    ...(lu.spellPicks?.cantrips||[]),
  ]);
  const alwaysPrepared=new Set(getAlwaysPreparedAtLevel(classId,subId,nextLevel));

  let html='';

  // ── New Cantrips ──
  if(spellGains.newCantrips>0){
    const cantripsPicked=lu.spellPicks.cantrips.length;
    const needed=spellGains.newCantrips;
    const availableCantrips=SPELL_DB.filter(s=>s[SP.level]===0&&classCanAccessSpell({...char,level:nextLevel},s)&&!existing.has(s[SP.id]));
    html+=`<div class="card">
      <div class="card-title">New Cantrip${needed>1?'s':''} (${cantripsPicked}/${needed})</div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:8px;">Choose ${needed} new cantrip${needed>1?'s':''} from your class list.</p>
      <div style="max-height:220px;overflow-y:auto;border:1px solid var(--border);border-radius:5px;">
        ${availableCantrips.map(s=>{
          const picked=lu.spellPicks.cantrips.includes(s[SP.id]);
          const full=!picked&&cantripsPicked>=needed;
          return`<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;border-bottom:1px solid var(--border);background:${picked?'#f9e8e8':'var(--surface)'};">
            <div style="flex:1;font-size:12px;"><strong>${s[SP.name]}</strong> <span style="color:var(--muted);">${SCHOOL_LABELS[s[SP.school]]}</span></div>
            <button onclick="toggleLuSpell('cantrips','${s[SP.id]}')" style="font-size:10px;padding:2px 8px;background:${picked?'var(--hp-red)':'var(--surface2)'};color:${picked?'#fff':'var(--ink)'};border:1px solid ${picked?'var(--hp-red)':'var(--border)'};border-radius:3px;cursor:pointer;"${full?'disabled':''}>${picked?'✕':'+'}</button>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  // ── New Known Spells (Bard/Sorc/Warlock/Ranger/EK/AT) ──
  if(spellGains.newSpells>0&&(mode==='known'||subId==='eldritch_knight'||subId==='arcane_trickster')){
    const spellsPicked=lu.spellPicks.spells.length;
    const needed=spellGains.newSpells;
    const availableSpells=SPELL_DB.filter(s=>s[SP.level]>0&&s[SP.level]<=maxSL&&classCanAccessSpell({...char,level:nextLevel},s)&&!existing.has(s[SP.id])&&!alwaysPrepared.has(s[SP.id]));
    html+=`<div class="card">
      <div class="card-title">New Spell${needed>1?'s':''} Known (${spellsPicked}/${needed})</div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:8px;">Choose ${needed} new spell${needed>1?'s':''} to add to your known spells (max ${ordinal(maxSL)}-level).</p>
      <div style="max-height:280px;overflow-y:auto;border:1px solid var(--border);border-radius:5px;">
        ${availableSpells.map(s=>{
          const picked=lu.spellPicks.spells.includes(s[SP.id]);
          const full=!picked&&spellsPicked>=needed;
          return`<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;border-bottom:1px solid var(--border);background:${picked?'#f9e8e8':'var(--surface)'};">
            <div style="flex:1;font-size:12px;">
              <strong>${s[SP.name]}</strong>
              <span style="color:var(--muted);margin-left:4px;">${ordinal(s[SP.level])} · ${SCHOOL_LABELS[s[SP.school]]}</span>
              ${s[SP.conc]?'<span style="font-size:9px;background:#fff3cd;color:#856404;padding:1px 4px;border-radius:6px;margin-left:3px;">C</span>':''}
            </div>
            <button onclick="toggleLuSpell('spells','${s[SP.id]}')" style="font-size:10px;padding:2px 8px;background:${picked?'var(--hp-red)':'var(--surface2)'};color:${picked?'#fff':'var(--ink)'};border:1px solid ${picked?'var(--hp-red)':'var(--border)'};border-radius:3px;cursor:pointer;"${full?'disabled':''}>${picked?'✕':'+'}</button>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  // ── Wizard: 2 free spells to spellbook ──
  if(spellGains.wizardFreeSpells>0&&mode==='spellbook'){
    const spellsPicked=lu.spellPicks.spells.length;
    const needed=spellGains.wizardFreeSpells;
    const availableSpells=SPELL_DB.filter(s=>s[SP.level]>0&&s[SP.level]<=maxSL&&classCanAccessSpell({...char,level:nextLevel},s)&&!existing.has(s[SP.id]));
    html+=`<div class="card">
      <div class="card-title">Add ${needed} Spells to Spellbook (${spellsPicked}/${needed})</div>
      <p style="font-size:12px;color:var(--muted);margin-bottom:8px;">Wizards add 2 spells of any level they can cast to their spellbook for free each level.</p>
      <div style="max-height:280px;overflow-y:auto;border:1px solid var(--border);border-radius:5px;">
        ${availableSpells.map(s=>{
          const picked=lu.spellPicks.spells.includes(s[SP.id]);
          const full=!picked&&spellsPicked>=needed;
          return`<div style="display:flex;align-items:center;gap:8px;padding:5px 8px;border-bottom:1px solid var(--border);background:${picked?'#f9e8e8':'var(--surface)'};">
            <div style="flex:1;font-size:12px;">
              <strong>${s[SP.name]}</strong>
              <span style="color:var(--muted);margin-left:4px;">${ordinal(s[SP.level])} · ${SCHOOL_LABELS[s[SP.school]]}</span>
            </div>
            <button onclick="toggleLuSpell('spells','${s[SP.id]}')" style="font-size:10px;padding:2px 8px;background:${picked?'var(--hp-red)':'var(--surface2)'};color:${picked?'#fff':'var(--ink)'};border:1px solid ${picked?'var(--hp-red)':'var(--border)'};border-radius:3px;cursor:pointer;"${full?'disabled':''}>${picked?'✕':'+'}</button>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  // ── New slot tier / always prepared notifications ──
  const infoLines=[];
  if(spellGains.newSpellSlotLevel) infoLines.push(`🔓 New spell slot tier unlocked: up to ${ordinal(spellGains.newSpellSlotLevel)}-level spells!`);
  if(spellGains.preparedCountChange>0) infoLines.push(`📋 Prepared spell cap increased by ${spellGains.preparedCountChange}`);
  if(spellGains.newAlwaysPrepared.length>0) infoLines.push(`⭐ New always-prepared spells: ${spellGains.newAlwaysPrepared.map(id=>spName(id)).join(', ')}`);

  if(infoLines.length>0){
    html+=`<div class="card">
      <div class="card-title">Spell Changes</div>
      ${infoLines.map(l=>`<p style="font-size:13px;color:var(--ink-light);margin-bottom:5px;line-height:1.5;">${l}</p>`).join('')}
    </div>`;
  }

  return html;
}

function toggleLuSpell(listKey, id){
  if(!levelUpState.spellPicks) levelUpState.spellPicks={cantrips:[],spells:[]};
  const arr=levelUpState.spellPicks[listKey];
  const idx=arr.indexOf(id);
  if(idx>-1) arr.splice(idx,1);
  else arr.push(id);
  render();
}

// ── LEVEL-UP SUMMARY SCREEN ────────────────────────────────────────────────────
// Shown briefly after confirm via a banner on the Level Up tab

function renderPostLevelUpBanner(){
  const lu=levelUpState;
  if(!lu.summary) return '';
  const {spellGains, atkGains}=lu.summary;

    ...atkGains.notes,

// ── EXTEND canConfirmLevelUp WITH SPELL PICKS ──────────────────────────────────
const _origCanConfirm=canConfirmLevelUp;
canConfirmLevelUp=function(){
  if(!_origCanConfirm()) return false;
  const nextLevel=char.level+1;
  const classId=char.class.id;
  const sub=char.tracker.subclass?char.tracker.subclass.id:'';
  const spellGains=computeSpellGains(classId,sub,char.level,nextLevel);
  const lu=levelUpState;
  if(!lu.spellPicks) lu.spellPicks={cantrips:[],spells:[]};

  // Must pick required cantrips
  if(spellGains.newCantrips>0&&lu.spellPicks.cantrips.length<spellGains.newCantrips) return false;
  // Must pick required known spells
  const mode=getSpellMode(char);
  if(spellGains.newSpells>0&&(mode==='known')){
    if(lu.spellPicks.spells.length<spellGains.newSpells) return false;
  }
  // Wizard must pick 2 free spells
  if(spellGains.wizardFreeSpells>0&&mode==='spellbook'){
    if(lu.spellPicks.spells.length<spellGains.wizardFreeSpells) return false;
  }
  return true;
};

// ── EXTEND confirmLevelUp TO APPLY SPELL/ATTACK GAINS ──────────────────────────
const _origConfirmLevelUp=confirmLevelUp;
confirmLevelUp=function(){
  const nextLevel=char.level+1;
  const classId=char.class.id;
  const sub=char.tracker.subclass?char.tracker.subclass.id:'';
  const lu=levelUpState;
  if(!lu.spellPicks) lu.spellPicks={cantrips:[],spells:[]};

  // Build summary BEFORE advancing level (so we compare from→to correctly)
  const summary=buildLevelUpSummary(char.level, nextLevel, classId, sub);

  // Run original confirm (handles HP, ASI, subclass, expertise, etc.)
  _origConfirmLevelUp();
  // Note: _origConfirmLevelUp already sets char.level=nextLevel and calls syncResources

  // Apply spell picks
  syncSpells(char);
  const sp2=char.tracker.spells;
  const mode=getSpellMode(char);
  const spellGains=summary.spellGains;

  // Cantrips
  lu.spellPicks.cantrips.forEach(id=>{if(!sp2.cantrips.includes(id))sp2.cantrips.push(id);});

  // Known spells or wizard spellbook
  if(mode==='known'){
    lu.spellPicks.spells.forEach(id=>{if(!sp2.known.includes(id))sp2.known.push(id);});
  } else if(mode==='spellbook'){
    lu.spellPicks.spells.forEach(id=>{if(!sp2.spellbook.includes(id))sp2.spellbook.push(id);});
  }

  // Reset spell picks for next level-up
  lu.spellPicks={cantrips:[],spells:[]};

  // Store summary for post-level-up banner
  levelUpState.summary=summary;

  // Final save
  save();
  render();
};

// ── EXTEND startLevelUp TO INITIALIZE spellPicks ──────────────────────────────
const _origStartLevelUp=startLevelUp;
startLevelUp=function(){
  _origStartLevelUp();
  levelUpState.spellPicks={cantrips:[],spells:[]};
  levelUpState.summary=null;
  render();
};



// ─── PERSISTENCE ──────────────────────────────────────────────────────────────

// Bump this when new fields are added that need to be back-filled on old saves.
// Add a new `if(v < N)` block in migrateChar() for each increment.
const SCHEMA_VERSION=1;

function migrateChar(char){
  if(!char||typeof char!=='object') return char;
  const v=char._schemaVersion||0;

  if(v<1){
    // ── Fields added in builder session 2 (equipment step) ──────────────────
    if(!char.equipment) char.equipment={armorId:null,armorName:null,hasShield:false,weapons:[],weaponDetails:[]};
    // skills map (used by Actions tab for proficiency-aware roll buttons)
    if(!char.skills){
      char.skills={};
      if(Array.isArray(char.skillProficiencies)) char.skillProficiencies.forEach(function(s){char.skills[s]=true;});
    }
    // Guarantee every top-level field loadFile() would set
    if(!char.feats||!Array.isArray(char.feats)) char.feats=[];
    if(!char.background) char.background={id:'',name:''};
    if(!char.speed) char.speed=30;
    // Guarantee every tracker sub-field
    if(!char.tracker) char.tracker={};
    var t=char.tracker;
    if(typeof t.currentHP!=='number') t.currentHP=char.hp?(char.hp.current||char.hp.max||8):8;
    if(typeof t.tempHP!=='number') t.tempHP=0;
    if(!t.deathSaves) t.deathSaves={successes:0,failures:0};
    if(!Array.isArray(t.conditions)) t.conditions=[];
    if(typeof t.exhaustion!=='number') t.exhaustion=0;
    if(!t.currency) t.currency={cp:0,sp:0,gp:0,pp:0};
    if(!Array.isArray(t.inventory)) t.inventory=[];
    if(typeof t.notes!=='string') t.notes='';
    if(!Array.isArray(t.sessionLog)) t.sessionLog=[];
    if(!Array.isArray(t.asiChoices)) t.asiChoices=[];
    if(!Array.isArray(t.featChoices)) t.featChoices=[];
    if(!t.subclass) t.subclass=null;
    if(!Array.isArray(t.classFeatures)) t.classFeatures=[];
    if(!Array.isArray(t.hpGains)) t.hpGains=[];
    if(!Array.isArray(t.expertiseSkills)) t.expertiseSkills=[];
    if(!t.resources) t.resources={};
    if(!t.spells||typeof t.spells!=='object') t.spells={cantrips:[],spellbook:[],prepared:[],known:[]};
    ['cantrips','spellbook','prepared','known'].forEach(function(k){if(!Array.isArray(t.spells[k]))t.spells[k]=[];});
    if(!Array.isArray(t.attacks)) t.attacks=[];
    if(!Array.isArray(t.maneuvers)) t.maneuvers=[];
  }

  // ── Future migrations ──────────────────────────────────────────────────────
  // if(v<2){ /* add fields introduced in next update */ }

  char._schemaVersion=SCHEMA_VERSION;
  return char;
}

function save(){
  if(char)store.set('dnd5e_tracker_char',JSON.stringify(char));
}

function saveAndRender(){save();render();}

function exportJSON(){
  if(!char)return;
  const blob=new Blob([JSON.stringify(char,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`${(char.identity.name||'character').replace(/\s+/g,'_').toLowerCase()}_tracker.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function applyCharData(data){
  // ── Normalise identity ────────────────────────────────────────────────
  if(!data.identity){
    if(data.name||data.character_name){
      data.identity={name:data.name||data.character_name||'Unknown',alignment:data.alignment||'True Neutral',appearance:data.appearance||'',personalityTrait:data.personalityTrait||'',ideals:data.ideals||'',bonds:data.bonds||'',flaws:data.flaws||''};
    } else {
      throw new Error('Missing "identity" block. Keys found: '+Object.keys(data).slice(0,10).join(', '));
    }
  }

  // ── Normalise class ───────────────────────────────────────────────────
  if(!data.class){
    var raw=data.charClass||data.classData||null;
    if(raw){ data.class=raw; }
    else {
      var cid=data.classId||data.class_id||null;
      if(cid){ data.class={id:cid,name:cid.charAt(0).toUpperCase()+cid.slice(1),hitDie:8,spellcasting:false,spellAbility:null,saves:[]}; }
      else { throw new Error('Missing "class" block. Keys found: '+Object.keys(data).slice(0,10).join(', ')); }
    }
  }
  if(!data.class.saves) data.class.saves=[];
  if(data.class.spellcasting===undefined) data.class.spellcasting=false;

  // ── Normalise race ────────────────────────────────────────────────────
  if(!data.race) data.race={id:'human',subraceId:null,name:'Human',raceName:'Human'};

  // ── Normalise abilities ───────────────────────────────────────────────
  if(!data.effectiveAbilities) data.effectiveAbilities=data.abilities||data.stats||{str:10,dex:10,con:10,int:10,wis:10,cha:10};
  ['str','dex','con','int','wis','cha'].forEach(function(s){ if(!data.effectiveAbilities[s]) data.effectiveAbilities[s]=10; });

  // ── Other top-level fields ────────────────────────────────────────────
  if(!data.level) data.level=1;
  if(!data.speed) data.speed=30;
  if(!data.ac){ data.ac=10+Math.floor(((data.effectiveAbilities.dex||10)-10)/2); }
  if(!data.proficiencyBonus) data.proficiencyBonus=Math.ceil(data.level/4)+1;
  if(!data.skillProficiencies) data.skillProficiencies=[];
  if(!data.feats||!Array.isArray(data.feats)) data.feats=[];
  if(!data.background) data.background={id:'',name:''};
  if(!Array.isArray(data.languages)) data.languages=[];
  if(data.toolProficiency===undefined) data.toolProficiency=null;
  if(!data.hp){ var con=Math.floor(((data.effectiveAbilities.con||10)-10)/2); data.hp={max:(data.class.hitDie||8)+con,current:(data.class.hitDie||8)+con}; }

  // ── Tracker fields ────────────────────────────────────────────────────
  if(!data.tracker) data.tracker={};
  var t=data.tracker;
  t.currentHP    = (typeof t.currentHP==='number')   ? t.currentHP   : (data.hp.current||data.hp.max||8);
  t.tempHP       = (typeof t.tempHP==='number')       ? t.tempHP      : 0;
  t.deathSaves   = t.deathSaves   || {successes:0,failures:0};
  t.conditions   = Array.isArray(t.conditions)   ? t.conditions   : [];
  t.exhaustion   = (typeof t.exhaustion==='number')   ? t.exhaustion  : 0;
  t.currency     = t.currency     || {cp:0,sp:0,gp:0,pp:0};
  t.inventory    = Array.isArray(t.inventory)    ? t.inventory    : [];
  // Seed inventory from builder equipment choices on first load (only when inventory is empty)
  if(t.inventory.length===0 && data.equipment){
    var eq=data.equipment;
    if(eq.armorName) t.inventory.push({name:eq.armorName,qty:1});
    if(eq.hasShield) t.inventory.push({name:'Shield',qty:1});
    if(Array.isArray(eq.weaponDetails)&&eq.weaponDetails.length){
      eq.weaponDetails.forEach(function(w){ t.inventory.push({name:w.name,qty:1}); });
    } else if(Array.isArray(eq.weapons)&&eq.weapons.length){
      eq.weapons.forEach(function(id){ t.inventory.push({name:id.replace(/_/g,' '),qty:1}); });
    }
  }
  t.notes        = (typeof t.notes==='string')        ? t.notes       : '';
  t.sessionLog   = Array.isArray(t.sessionLog)   ? t.sessionLog   : [];
  t.asiChoices   = Array.isArray(t.asiChoices)   ? t.asiChoices   : [];
  t.featChoices  = Array.isArray(t.featChoices)  ? t.featChoices  : [];
  t.subclass     = t.subclass     || null;
  t.classFeatures= Array.isArray(t.classFeatures)? t.classFeatures: [];
  t.hpGains      = Array.isArray(t.hpGains)      ? t.hpGains      : [];
  t.expertiseSkills=Array.isArray(t.expertiseSkills)?t.expertiseSkills:[];
  t.resources    = t.resources    || {};
  if(!t.spells||typeof t.spells!=='object') t.spells={cantrips:[],spellbook:[],prepared:[],known:[]};
  if(!Array.isArray(t.spells.cantrips))  t.spells.cantrips=[];
  if(!Array.isArray(t.spells.spellbook)) t.spells.spellbook=[];
  if(!Array.isArray(t.spells.prepared))  t.spells.prepared=[];
  if(!Array.isArray(t.spells.known))     t.spells.known=[];
  if(!Array.isArray(t.attacks))   t.attacks=[];
  if(!Array.isArray(t.maneuvers)) t.maneuvers=[];

  // Apply
  data=migrateChar(data);
  char=data;
  syncResources(char);
  syncSpells(char);
  store.set('dnd5e_tracker_char',JSON.stringify(char));
  activeTab='combat';
  render();
  showToast(`${char.identity.name} loaded successfully.`,'success');
}

function loadFile(file){
  const reader=new FileReader();
  reader.onload=function(e){
    // Reset file inputs now so re-selecting same file always works
    document.querySelectorAll('input[type="file"]').forEach(function(el){el.value='';});

    var data;
    try{ data=JSON.parse(e.target.result); }
    catch(parseErr){ alert('File is not valid JSON. Please export again from the Character Builder.'); return; }

    try{
      applyCharData(data);
    }catch(err){
      console.error('Tracker load error:',err);
      alert('Error reading character data:\n'+err.message+'\n\nTry exporting again from the Character Builder.');
    }
  };
  reader.readAsText(file);
}

function loadPendingImport(){
  const raw=store.get('dnd5e_pending_import');
  if(!raw) return false;
  store.remove('dnd5e_pending_import');
  try{
    applyCharData(JSON.parse(raw));
    return true;
  }catch(e){
    console.error('Pending import failed:',e);
    return false;
  }
}

function attachTrackerEvents(){
  const la=document.getElementById('log-draft');
  if(la)la.oninput=e=>{logDraft=e.target.value;};
}

// ─── UPLOAD SCREEN ────────────────────────────────────────────────────────────

function renderUpload(){
  return`<div class="upload-screen">
    <div class="upload-box">
      <div class="upload-icon">📜</div>
      <h2>Import Character</h2>
      <p>Load a character JSON exported from the D&amp;D 5E Character Builder</p>
      <p style="margin-top:6px;font-size:12px;color:var(--muted);">(Use the "Export for Tracker" button on the character sheet summary)</p>
      <label style="display:inline-block;margin-top:16px;font-family:'Cinzel',serif;font-size:13px;padding:9px 22px;background:var(--red);color:#fff;border-radius:5px;cursor:pointer;letter-spacing:0.5px;" onclick="event.stopPropagation()">
        📂 Choose Character File
        <input type="file" accept=".json" onchange="handleFileInput(this)" style="display:none;"/>
      </label>
    </div>
    ${store.get('dnd5e_tracker_char')?`
      <div style="margin-top:20px;text-align:center;">
        <p style="font-size:13px;color:var(--muted);margin-bottom:10px;">Or continue your last session:</p>
        <button class="btn btn-gold" onclick="loadSaved()">▶ Resume Last Character</button>
      </div>`:''
    }
  </div>`;
}

function loadSaved(){
  try{
    char=JSON.parse(store.get('dnd5e_tracker_char'));
    char=migrateChar(char);
    syncResources(char);
    syncSpells(char);
    activeTab='combat';
    render();
  }catch(e){store.remove('dnd5e_tracker_char');render();}
}

// Initialize — check for a character passed directly from the builder before falling through to the upload screen
if(!loadPendingImport()) render();

// File input handled via handleFileInput() defined at top of script
</script>
